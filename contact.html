    <style>
        /* Same as above */
        :root {
            --bg: #1a0f2e;
            --bg2: #231538;
            --text: #f0e6ff;
            --text2: #c4b5dc;
            --text3: #a08cc5;
            --gold: #f0b90b;
            --border: rgba(255,255,255,0.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Outfit',sans-serif;
            background:linear-gradient(170deg, #1a0f2e 0%, #231538 30%, #1f1235 60%, #1a0f2e 100%);

            color:var(--text);
            line-height:1.6;
            min-height:100vh;
        }
        .nav {
            background:rgba(26,15,46,0.88);
            backdrop-filter:blur(24px);
            border-bottom:1px solid var(--border);
            padding:16px 20px;
            display:flex;
            align-items:center;
            gap:20px;
            flex-wrap:wrap;
        }
        .nav a { color:var(--gold); text-decoration:none; font-weight:600; }
        .nav .logo { font-size:1.5rem; font-family:'Cormorant Garamond',serif; }
        .nav-links { display:flex; gap:15px; flex-wrap:wrap; }
        .container {
            max-width:800px;
            margin:40px auto;
            padding:0 20px;
        }
        h1 {
            font-family:'Cormorant Garamond',serif;
            font-size:2.5rem;
            color:#fff;
            margin-bottom:20px;
        }
        .footer {
            text-align:center;
            padding:30px;
            color:var(--text3);
            border-top:1px solid var(--border);
            margin-top:60px;
        }
        .email-link { color:var(--gold); text-decoration:none; }
        .email-link:hover { text-decoration:underline; }
    </style>
</head>

    <nav class="nav">
        <a href="/" class="logo">📚 Bibek Books</a>
        <div class="nav-links">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bibek Books | Digital Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1510;
            --ink-2: #4a4035;
            --ink-3: #8a7a6a;
            --paper: #faf7f2;
            --paper-2: #f2ede4;
            --paper-3: #e8e0d4;
            --forest: #2c5f45;
            --forest-l: #3d7d5c;
            --forest-pale: #e8f2ec;
            --amber: #c07c2a;
            --amber-l: #f5e4c8;
            --ruby: #b03030;
            --ruby-l: #fae8e8;
            --card: #ffffff;
            --border: rgba(0, 0, 0, 0.09);
            --shadow-xs: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.18);
            --r: 14px;
            --r-sm: 8px;
            --t: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --nav-h: 66px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ::selection {
            background: var(--forest-pale);
            color: var(--forest);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--paper);
            color: var(--ink);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* NAV */
        .nav {
            position: sticky;
            top: 0;
            z-index: 200;
            height: var(--nav-h);
            background: rgba(250, 247, 242, 0.94);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            width: 100%;
        }
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--forest);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .nav-logo-mark {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--forest), var(--amber));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(44, 95, 69, 0.35);
        }
        .nav-spacer {
            flex: 1;
        }
        .nav-btns {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }
        .nav-btn {
            height: 40px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: var(--t);
            font-family: inherit;
            font-weight: 500;
            font-size: 0.82rem;
            padding: 0 12px;
            background: transparent;
            color: var(--ink-2);
            position: relative;
            white-space: nowrap;
        }
        .nav-btn:hover {
            background: var(--paper-3);
            color: var(--ink);
        }
        .nav-btn-icon {
            width: 40px;
            padding: 0;
            font-size: 1.15rem;
        }
        .wish-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--ruby);
            border: 2px solid var(--paper);
            display: none;
        }
        .wish-dot.show {
            display: block;
        }

        /* 3-DOT DROPDOWN */
        .dropdown-wrap {
            position: relative;
        }
        .dropdown-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            background: #fff;
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            min-width: 210px;
            padding: 8px;
            display: none;
            z-index: 260;
            border: 1px solid var(--border);
            animation: dropIn 0.2s ease;
        }
        .dropdown-wrap.open .dropdown-menu {
            display: block;
        }
        @keyframes dropIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .dropdown-item {
            padding: 11px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            transition: background 0.15s;
            color: var(--ink-2);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }
        .dropdown-item:hover {
            background: var(--paper-2);
            color: var(--ink);
        }
        .dropdown-item.acc-item {
            font-weight: 600;
            color: var(--forest);
        }
        .dropdown-divider {
            height: 1px;
            background: var(--border);
            margin: 6px 8px;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 48px 24px 32px;
            position: relative;
        }
        .hero-badge {
            display: inline-flex;
            gap: 6px;
            background: var(--forest-pale);
            color: var(--forest);
            padding: 5px 14px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 18px;
            border: 1px solid rgba(44, 95, 69, 0.2);
        }
        .hero h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.2rem, 5vw, 3.6rem);
            font-weight: 700;
            letter-spacing: -0.8px;
            margin-bottom: 12px;
        }
        .hero h1 em {
            color: var(--forest);
            font-style: italic;
        }
        .hero p {
            color: var(--ink-3);
            max-width: 460px;
            margin: 0 auto 24px;
        }
        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
        }
        .hero-stat strong {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--forest);
            display: block;
        }
        .hero-stat span {
            font-size: 0.78rem;
            color: var(--ink-3);
        }

        /* MAIN */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px 80px;
        }

        /* AUTHOR PANEL */
        .author-panel {
            background: var(--card);
            border: 1.5px solid var(--amber-l);
            border-radius: var(--r);
            padding: 28px;
            margin-bottom: 28px;
            display: none;
            box-shadow: var(--shadow-sm);
        }
        .author-panel.open {
            display: block;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .panel-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--amber);
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .fg {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .fg label {
            font-weight: 600;
            font-size: 0.78rem;
            color: var(--ink-3);
            text-transform: uppercase;
        }
        .fg input,
        .fg textarea,
        .fg select {
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            font-family: inherit;
            font-size: 0.88rem;
            background: #fff;
            outline: none;
        }
        .fg input:focus,
        .fg textarea:focus {
            border-color: var(--forest);
            box-shadow: 0 0 0 3px var(--forest-pale);
        }
        .check-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--r-sm);
            background: #fff;
            margin-bottom: 12px;
        }

        /* SECTION BAR */
        .section-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 22px;
        }
        .section-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 700;
            white-space: nowrap;
        }
        .section-search {
            position: relative;
        }
        .section-search input {
            padding: 10px 18px 10px 42px;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            font-size: 0.88rem;
            font-family: inherit;
            background: var(--card);
            outline: none;
            width: 240px;
            transition: var(--t);
        }
        .section-search input:focus {
            border-color: var(--forest);
            box-shadow: 0 0 0 4px var(--forest-pale);
            width: 280px;
        }
        .section-search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-3);
            pointer-events: none;
            font-size: 0.9rem;
        }
        .cat-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pill {
            padding: 7px 18px;
            border-radius: 50px;
            border: 1.5px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: 0.82rem;
            font-family: inherit;
            transition: var(--t);
            color: var(--ink-3);
            white-space: nowrap;
        }
        .pill:hover {
            border-color: var(--forest);
            color: var(--forest);
        }
        .pill.on {
            background: var(--forest);
            color: #fff;
            border-color: var(--forest);
        }

        /* BOOK GRID */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(200px, 45%), 1fr));
            gap: 16px;
        }
        .book-card {
            background: var(--card);
            border-radius: var(--r);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--t);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-xs);
        }
        .book-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        .book-cover {
            width: 100%;
            aspect-ratio: 2/2.9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .cover-text {
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        }
        .book-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 2;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
        }
        .badge-free {
            background: var(--forest);
            color: #fff;
        }
        .badge-disc {
            background: var(--ruby);
            color: #fff;
        }
        .badge-read {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 2;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.65rem;
            opacity: 0;
            transition: var(--t);
        }
        .book-card:hover .badge-read {
            opacity: 1;
        }
        .book-info {
            padding: 14px;
            flex: 1;
        }
        .book-title {
            font-weight: 600;
            font-size: 0.92rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-author {
            font-size: 0.76rem;
            color: var(--ink-3);
            margin-top: 2px;
        }
        .price-row {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-top: 6px;
        }
        .price-now {
            font-weight: 800;
            font-size: 1rem;
            color: var(--forest);
        }
        .price-was {
            font-size: 0.73rem;
            text-decoration: line-through;
            color: #aaa;
        }
        .card-btns {
            display: flex;
            gap: 7px;
            margin-top: 10px;
        }
        .c-btn {
            flex: 1;
            border: 1px solid var(--border);
            padding: 7px 8px;
            border-radius: 50px;
            font-size: 0.74rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--paper);
            font-family: inherit;
            text-decoration: none;
            color: var(--ink);
            transition: var(--t);
        }
        .c-btn:hover {
            background: var(--paper-3);
        }
        .c-btn.wishlisted {
            color: var(--ruby);
            border-color: var(--ruby-l);
            background: var(--ruby-l);
        }
        .c-btn.buy-btn {
            background: var(--forest);
            color: #fff;
            border-color: var(--forest);
        }
        .c-btn.buy-btn:hover {
            background: var(--forest-l);
        }
        .btn {
            padding: 9px 22px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
            transition: var(--t);
        }
        .btn-forest {
            background: var(--forest);
            color: #fff;
        }
        .btn-forest:hover {
            background: var(--forest-l);
        }
        .btn-amber {
            background: var(--amber);
            color: #fff;
        }
        .btn-ghost {
            background: var(--paper-2);
            color: var(--ink-2);
        }
        .btn-ruby {
            background: var(--ruby);
            color: #fff;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.78rem;
        }

        /* OVERLAY & MODALS */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: #fff;
            border-radius: var(--r);
            width: 100%;
            max-width: 900px;
            max-height: 92vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .card-modal {
            background: #fff;
            border-radius: 20px;
            max-width: 540px;
            width: 90%;
            max-height: 86vh;
            overflow-y: auto;
            padding: 28px;
        }
        .modal-head {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            background: var(--paper-2);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--t);
        }
        .modal-close:hover {
            background: var(--paper-3);
        }
        .modal-foot {
            padding: 14px 22px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        .book-detail {
            display: flex;
            gap: 24px;
            padding: 24px;
            flex-wrap: wrap;
        }
        .book-detail-cover {
            width: 140px;
            height: 200px;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            color: #fff;
            text-align: center;
            padding: 16px;
        }
        .book-detail-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .book-detail-cover-grad {
            width: 140px;
            height: 200px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            color: #fff;
            text-align: center;
            padding: 16px;
            background: linear-gradient(135deg, var(--forest), var(--amber));
        }
        .buy-summary {
            background: var(--paper-2);
            border-radius: var(--r-sm);
            padding: 18px;
            margin-bottom: 20px;
        }
        .buy-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            margin-top: 10px;
            color: var(--forest);
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--ink-3);
        }
        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        /* TOAST */
        .toast-wrap {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 11px 20px;
            border-radius: 50px;
            color: #fff;
            font-weight: 500;
            animation: slideInL 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            box-shadow: var(--shadow-md);
            font-size: 0.85rem;
        }
        .toast.ok {
            background: #2d7a52;
        }
        .toast.err {
            background: #b03030;
        }

        /* AUTH OVERLAY */
        .auth-overlay {
            position: fixed;
            inset: 0;
            z-index: 400;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        .auth-card {
            background: white;
            border-radius: 28px;
            max-width: 420px;
            width: 90%;
            padding: 32px 28px;
            text-align: center;
        }
        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
        }
        .auth-tab {
            flex: 1;
            background: none;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            color: var(--ink-3);
            padding-bottom: 8px;
            font-family: inherit;
            transition: var(--t);
        }
        .auth-tab.active {
            color: var(--forest);
            border-bottom: 2px solid var(--forest);
        }

        /* FOOTER */
        .site-footer {
            background: var(--paper-3);
            border-top: 1px solid var(--border);
            padding: 30px 24px;
            text-align: center;
            font-size: 0.74rem;
            color: var(--ink-3);
            white-space: pre-line;
            margin-top: 60px;
        }

        @keyframes slideInL {
            from {
                transform: translateX(-120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(6px);
            }
        }

        @media(max-width:768px) {
            .book-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .section-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .section-left {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            .section-search input {
                width: 100%;
            }
            .section-search input:focus {
                width: 100%;
            }
            .cat-pills {
                justify-content: flex-start;
            }
            .hero {
                padding: 32px 16px 24px;
            }
            .dropdown-menu {
                min-width: 180px;
                right: -8px;
            }
        }
        @media(max-width:480px) {
            .nav-logo {
                font-size: 1.3rem;
                gap: 6px;
            }
            .nav-logo-mark {
                width: 32px;
                height: 32px;
                font-size: 0.95rem;
                border-radius: 8px;
            }
            .nav-btn {
                font-size: 0.75rem;
                padding: 0 8px;
            }
            .nav-btn-icon {
                width: 34px;
                padding: 0;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- TOAST -->
    <div class="toast-wrap" id="toastWrap"></div>

    <!-- AUTH MODAL -->
    <div id="authModal" style="display:none" class="auth-overlay" onclick="if(event.target===this)closeAuthModal()">
        <div class="auth-card">
            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login">Login</button>
                <button class="auth-tab" data-tab="register">Create Account</button>
            </div>
            <div id="authFormContainer"></div>
            <div id="authFootMsg" style="margin-top:12px;font-size:0.8rem;color:var(--ink-3)"></div>
        </div>
    </div>

    <!-- NAV -->
    <nav class="nav">
        <a class="nav-logo" href="#"><div class="nav-logo-mark">📚</div>Bibek Books</a>
        <div class="nav-spacer"></div>
        <div class="nav-btns">

    <!-- FIREBASE + APP JS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC9vp6iqR0O2KOKguHBKs6ZWCWXN1oEzAs",
            authDomain: "bibek-media-143ba.firebaseapp.com",
            projectId: "bibek-media-143ba",
            storageBucket: "bibek-media-143ba.firebasestorage.app",
            messagingSenderId: "135854036939",
            appId: "1:135854036939:web:35d2b18c16c6037ef7484e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const auth = getAuth(app);

        // ── STATE ──────────────────────────────────
        let books = [],
            currentUser = null,
            userWishlist = [],
            userCart = [],
            userPurchased = [],
            isAuthor = false,
            activeCat = 'All';
        const CATS = ['Spiritual', 'Fiction', 'Non-Fiction', 'Science', 'History', 'Poetry', 'Business'];
        const PALETTES = [
            ['#2c5f45', '#4a9e72'],
            ['#7a3b1e', '#c47a4a'],
            ['#1a4a7a', '#4a90c8'],
            ['#5a2d7a', '#9a55c8'],
            ['#a82020', '#d86060'],
            ['#1e6070', '#3ab0c8']
        ];
        const RAZORPAY_KEY = 'rzp_test_YourKeyHere';
        const SK_PASS_KEY = 'bibek_pass';
        const DEF_PASS = 'author123';

        const getPass = () => localStorage.getItem(SK_PASS_KEY) || DEF_PASS;
        const setPass = p => localStorage.setItem(SK_PASS_KEY, p);
        const getCopy = () => localStorage.getItem('bibek_copy') ||
            `Copyright © 2026 by Bibek Patra\nBibek Books · Digital Bookstore`;
        const saveCopy = t => { localStorage.setItem('bibek_copy', t);
            document.getElementById('siteFooter').textContent = t; };
        const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const toast = (msg, type = 'ok') => {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.getElementById('toastWrap').appendChild(t);
            setTimeout(() => t.remove(), 3300);
        };
        const calcPrice = (b) => {
            if (b.isFree) return { cur: 0, orig: b.price || 0, disc: 0 };
            const d = Math.max(0, Math.min(90, b.discount || 0));
            return { cur: d > 0 ? Math.round(b.price * (1 - d / 100)) : b.price, orig: b.price, disc: d };
        };
        const readFileAsDataURL = (file) => new Promise((res, rej) => {
            if (!file) { res(''); return; }
            const r = new FileReader();
            r.onload = () => {
                const img = new Image();
                img.onload = () => {
                    const MAX = 600;
                    let w = img.width,
                        h = img.height;
                    if (w > MAX || h > MAX) w > h ? (h = Math.round(h * MAX / w), w = MAX) : (w = Math
                        .round(w * MAX / h), h = MAX);
                    const canvas = document.createElement('canvas');
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.75));
                };
                img.onerror = rej;
                img.src = r.result;
            };
            r.readAsDataURL(file);
        });
        const uploadPdf = async (file) => {
            if (!file) return '';
            const safeName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`;
            const storageRef = ref(storage, `books/pdfs/${safeName}`);
            await uploadBytes(storageRef, file);
            return await getDownloadURL(storageRef);
        };

        // ── USER DATA ──────────────────────────────
        async function loadUserData(uid) {
            if (!uid) return;
            const refDoc = doc(db, 'userData', uid);
            const snap = await getDoc(refDoc);
            if (snap.exists()) {
                const d = snap.data();
                userWishlist = d.wishlist || [];
                userCart = d.cart || [];
                userPurchased = d.purchased || [];
            } else {
                userWishlist = [];
                userCart = [];
                userPurchased = [];
                await setDoc(refDoc, { wishlist: [], cart: [], purchased: [] });
            }
            updateDots();
            filterBooks();
        }
        async function saveUserField(uid, field, val) {
            if (!uid) return;
            await setDoc(doc(db, 'userData', uid), { [field]: val }, { merge: true });
        }

        // ── DOTS ────────────────────────────────────
        function updateDots() {
            const cd = document.getElementById('cartDot');
            const wd = document.getElementById('wishDot');
            if (userCart.length > 0) cd.classList.add('show');
            else cd.classList.remove('show');
            if (userWishlist.length > 0) wd.classList.add('show');
            else wd.classList.remove('show');
        }

        // ── RENDER BOOKS ───────────────────────────
        function renderBookGrid(bookArr) {
            const grid = document.getElementById('bookGrid');
            if (!bookArr.length) {
                grid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                  <div class="empty-icon">📭</div>
                  <p><strong>No books found</strong></p>
                  <p style="margin-top:4px">Try adjusting your search or category filter.</p>
                </div>`;
                return;
            }
            grid.innerHTML = bookArr.map((b, i) => {
                const pr = calcPrice(b);
                const pal = PALETTES[i % PALETTES.length];
                const coverHTML = b.coverImage ?
                    `<img src="${esc(b.coverImage)}" alt="${esc(b.title)}" loading="lazy">` :
                    `<div class="cover-text">${esc(b.title)}</div>`;
                const badgeHTML = b.isFree ?
                    '<span class="book-badge badge-free">FREE</span>' :
                    (pr.disc > 0 ? `<span class="book-badge badge-disc">-${pr.disc}%</span>` : '');
                const priceHTML = b.isFree ?
                    '<span class="price-now">Free</span>' :
                    `${pr.disc>0?`<span class="price-was">₹${pr.orig}</span>`:''}<span class="price-now">₹${pr.cur}</span>`;
                const isWishlisted = userWishlist.includes(b.id);
                const isInCart = userCart.includes(b.id);
                const isPurchased = userPurchased.includes(b.id);
                return `
                <div class="book-card" onclick="window._openDetail('${b.id}')">
                  <div class="book-cover" style="background:linear-gradient(135deg,${pal[0]},${pal[1]})">
                    ${coverHTML}
                    ${badgeHTML}
                    <span class="badge-read">📖 Quick View</span>
                  </div>
                  <div class="book-info">
                    <div class="book-title">${esc(b.title)}</div>
                    <div class="book-author">by ${esc(b.author)}</div>
                    <div class="price-row">${priceHTML}</div>
                    <div class="card-btns" onclick="event.stopPropagation()">
                      <button class="c-btn ${isWishlisted?'wishlisted':''}" onclick="window._toggleWishlist('${b.id}')">
                        ${isWishlisted?'❤️':'🤍'}
                      </button>
                      ${isPurchased||b.isFree?`<a class="c-btn buy-btn" href="${esc(b.pdfUrl||'#')}" target="_blank" onclick="event.stopPropagation()">📖 Read</a>`:
                        `<button class="c-btn buy-btn" onclick="window._addToCart('${b.id}')">${isInCart?'✓ In Cart':'🛒 Buy'}</button>`
                      }
                    </div>
                  </div>
                </div>`;
            }).join('');
        }

        function filterBooks() {
            const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
            let filtered = books;
            if (activeCat !== 'All') filtered = filtered.filter(b => b.category === activeCat);
            if (q) filtered = filtered.filter(b =>
                (b.title || '').toLowerCase().includes(q) || (b.author || '').toLowerCase().includes(q)
            );
            document.getElementById('sectionTitle').textContent =
                q ? `Results for "${esc(q)}"` : (activeCat === 'All' ? 'All Books' : activeCat);
            renderBookGrid(filtered);
        }

        function renderCatPills() {
            const container = document.getElementById('catPills');
            container.innerHTML = ['All', ...CATS].map(c =>
                `<button class="pill ${c===activeCat?'on':''}" onclick="window._setCat('${c}')">${c}</button>`
            ).join('');
        }

        // ── GLOBAL WINDOW REFS ──────────────────────
        window._openDetail = (id) => openDetailModal(id);
        window._toggleWishlist = (id) => requireAuthThen(() => toggleWishlist(id));
        window._addToCart = (id) => requireAuthThen(() => addToCart(id));
        window._setCat = (c) => { activeCat = c;
            renderCatPills();
            filterBooks(); };

        // ── WISHLIST ────────────────────────────────
        async function toggleWishlist(bookId) {
            if (!currentUser) return;
            const idx = userWishlist.indexOf(bookId);
            if (idx > -1) userWishlist.splice(idx, 1);
            else userWishlist.push(bookId);
            await saveUserField(currentUser.uid, 'wishlist', userWishlist);
            updateDots();
            filterBooks();
            toast(idx > -1 ? 'Removed from wishlist' : 'Added to wishlist');
        }

        // ── CART ────────────────────────────────────
        async function addToCart(bookId) {
            if (!currentUser) return;
            if (userCart.includes(bookId)) { toast('Already in cart', 'err'); return; }
            if (userPurchased.includes(bookId)) { toast('Already purchased', 'err'); return; }
            userCart.push(bookId);
            await saveUserField(currentUser.uid, 'cart', userCart);
            updateDots();
            filterBooks();
            toast('Added to cart');
        }
        async function removeFromCart(bookId) {
            if (!currentUser) return;
            userCart = userCart.filter(id => id !== bookId);
            await saveUserField(currentUser.uid, 'cart', userCart);
            updateDots();
            filterBooks();
            openCart();
            toast('Removed from cart');
        }

        function openWishlist() {
            const modal = document.getElementById('wishModal');
            const container = document.getElementById('wishItems');
            const items = books.filter(b => userWishlist.includes(b.id));
            if (!items.length) {
                container.innerHTML =
                    '<div class="empty-state"><div class="empty-icon">💔</div><p>Your wishlist is empty.</p></div>';
            } else {
                container.innerHTML = items.map(b => {
                    const pr = calcPrice(b);
                    return `<div style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
                <div style="width:48px;height:68px;border-radius:6px;background:var(--forest-pale);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.7rem;color:var(--forest);flex-shrink:0;overflow:hidden">
                  ${b.coverImage?`<img src="${esc(b.coverImage)}" style="width:100%;height:100%;object-fit:cover">`:esc(b.title).slice(0,2)}
                </div>
                <div style="flex:1"><strong>${esc(b.title)}</strong><br><small>${esc(b.author)}</small></div>
                <span style="font-weight:700;color:var(--forest)">${b.isFree?'Free':`₹${pr.cur}`}</span>
                <button class="btn btn-sm btn-ghost" onclick="window._toggleWishlist('${b.id}')">❌</button>
              </div>`;
                }).join('');
            }
            modal.style.display = 'flex';
        }

        function closeWishModal() { document.getElementById('wishModal').style.display = 'none'; }

        function openCart() {
            const modal = document.getElementById('cartModal');
            const container = document.getElementById('cartItems');
            const foot = document.getElementById('cartFoot');
            const items = books.filter(b => userCart.includes(b.id));
            if (!items.length) {
                container.innerHTML =
                    '<div class="empty-state"><div class="empty-icon">🛒</div><p>Your cart is empty.</p></div>';
                foot.innerHTML = '';
            } else {
                let total = 0;
                container.innerHTML = items.map(b => {
                    const pr = calcPrice(b);
                    total += pr.cur;
                    return `<div style="display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
                <div style="width:48px;height:68px;border-radius:6px;background:var(--forest-pale);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.7rem;color:var(--forest);flex-shrink:0;overflow:hidden">
                  ${b.coverImage?`<img src="${esc(b.coverImage)}" style="width:100%;height:100%;object-fit:cover">`:esc(b.title).slice(0,2)}
                </div>
                <div style="flex:1"><strong>${esc(b.title)}</strong><br><small>${esc(b.author)}</small></div>
                <span style="font-weight:700;color:var(--forest)">${b.isFree?'Free':`₹${pr.cur}`}</span>
                <button class="btn btn-sm btn-ghost" onclick="window._removeFromCart('${b.id}')">✕</button>
              </div>`;
                }).join('');
                foot.innerHTML = `
              <div class="buy-summary">
                <div style="display:flex;justify-content:space-between"><span>Subtotal</span><span>₹${total}</span></div>
                <div class="buy-total"><span>Total</span><span>₹${total}</span></div>
              </div>
              <button class="btn btn-forest" style="width:100%;justify-content:center" onclick="openBuy()">💳 Proceed to Pay ₹${total}</button>`;
            }
            modal.style.display = 'flex';
        }
        window._removeFromCart = (id) => removeFromCart(id);

        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }

        function openBuy() {
            const modal = document.getElementById('buyModal');
            const body = document.getElementById('buyBody');
            const items = books.filter(b => userCart.includes(b.id));
            let total = 0;
            items.forEach(b => { const pr = calcPrice(b);
                total += pr.cur; });
            body.innerHTML = `
            <div class="buy-summary">
              <p><strong>${items.length} item(s)</strong> ready for checkout</p>
              <div class="buy-total"><span>Total Amount</span><span>₹${total}</span></div>
            </div>
            <p style="font-size:0.78rem;color:var(--ink-3);margin-bottom:12px">🔒 Secure payment via Razorpay</p>
            <button class="btn btn-forest" style="width:100%;justify-content:center" onclick="window._processPayment(${total})">Pay ₹${total}</button>
            <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="closeBuy()">Cancel</button>`;
            modal.style.display = 'flex';
        }
        window._processPayment = (amount) => {
            if (!window.Razorpay) { toast('Payment gateway loading…', 'err'); return; }
            const options = {
                key: RAZORPAY_KEY,
                amount: amount * 100,
                currency: 'INR',
                name: 'Bibek Books',
                description: 'Book Purchase',
                handler: async function(response) {
                    if (currentUser) {
                        userPurchased = [...userPurchased, ...userCart];
                        userCart = [];
                        await saveUserField(currentUser.uid, 'cart', userCart);
                        await saveUserField(currentUser.uid, 'purchased', userPurchased);
                        updateDots();
                        filterBooks();
                    }
                    closeBuy();
                    closeCart();
                    toast('✅ Payment successful! Books added to your library.');
                },
                modal: { ondismiss: () => toast('Payment cancelled', 'err') },
                theme: { color: '#2c5f45' }
            };
            const rzp = new Razorpay(options);
            rzp.open();
        };

        function closeBuy() { document.getElementById('buyModal').style.display = 'none'; }

        // ── DETAIL MODAL ────────────────────────────
        function openDetailModal(bookId) {
            const b = books.find(x => x.id === bookId);
            if (!b) return;
            const pr = calcPrice(b);
            document.getElementById('detailTitle').textContent = b.title;
            const body = document.getElementById('detailBody');
            const coverHTML = b.coverImage ?
                `<img src="${esc(b.coverImage)}" alt="${esc(b.title)}" style="width:100%;height:100%;object-fit:cover">` :
                `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;color:#fff;text-align:center;padding:16px;background:linear-gradient(135deg,var(--forest),var(--amber));border-radius:10px">${esc(b.title)}</div>`;
            body.innerHTML = `
            <div class="book-detail-cover" style="background:transparent">${coverHTML}</div>
            <div style="flex:1;min-width:200px">
              <h2 style="font-family:'Cormorant Garamond',serif;font-size:1.5rem">${esc(b.title)}</h2>
              <p style="color:var(--ink-3)">by <strong>${esc(b.author)}</strong></p>
              <p style="font-size:0.8rem;color:var(--ink-3)">📅 ${esc(b.publishDate||'N/A')} · 📂 ${esc(b.category||'N/A')}</p>
              ${b.description?`<p style="margin-top:10px;font-size:0.9rem">${esc(b.description)}</p>`:''}
              <div class="price-row" style="margin-top:12px">
                ${b.isFree?'<span class="price-now">📖 Free</span>':`${pr.disc>0?`<span class="price-was">₹${pr.orig}</span>`:''}<span class="price-now">₹${pr.cur}</span>`}
              </div>
            </div>`;
            const foot = document.getElementById('detailFoot');
            const isPurchased = userPurchased.includes(b.id);
            const isInCart = userCart.includes(b.id);
            const isWishlisted = userWishlist.includes(b.id);
            foot.innerHTML = `
            <button class="btn btn-ghost btn-sm" onclick="window._toggleWishlist('${b.id}')">${isWishlisted?'❤️ Wishlisted':'🤍 Wishlist'}</button>
            ${isPurchased||b.isFree?`<a class="btn btn-forest btn-sm" href="${esc(b.pdfUrl||'#')}" target="_blank">📖 Read Now</a>`:
              `<button class="btn btn-forest btn-sm" onclick="window._addToCart('${b.id}')">${isInCart?'✓ In Cart':'🛒 Add to Cart'}</button>`
            }
            ${isAuthor?`<button class="btn btn-amber btn-sm" onclick="closeDetailModal();openEditModal('${b.id}')">✏️ Edit</button><button class="btn btn-ruby btn-sm" onclick="closeDetailModal();deleteBook('${b.id}')">🗑️ Delete</button>`:''}
            <button class="btn btn-ghost btn-sm" onclick="closeDetailModal()">Close</button>`;
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeDetailModal() { document.getElementById('detailModal').style.display = 'none'; }

        // ── AUTHOR PANEL ────────────────────────────
        function toggleAuthorPanel() {
            const panel = document.getElementById('authorPanel');
            if (!isAuthor) {
                const pw = prompt('Enter author password:');
                if (!pw) return;
                if (pw === getPass()) {
                    isAuthor = true;
                    toast('✅ Author verified');
                } else { toast('❌ Wrong password', 'err'); return; }
            }
            panel.classList.toggle('open');
            if (panel.classList.contains('open')) renderAuthorPanel();
        }

        function renderAuthorPanel() {
            document.getElementById('authorPanelHead').innerHTML = `
            <button class="btn btn-sm btn-amber" onclick="window._showAddBookForm()">+ New Book</button>
            <button class="btn btn-sm btn-ghost" onclick="window._changeAuthorPass()">🔑 Change Password</button>
            <button class="btn btn-sm btn-ruby" onclick="window._logoutAuthor()">Lock Panel</button>`;
            showAddBookForm();
        }
        window._showAddBookForm = () => showAddBookForm();
        window._changeAuthorPass = () => {
            const np = prompt('Enter new author password:');
            if (np && np.trim()) { setPass(np.trim());
                toast('✅ Password updated'); }
        };
        window._logoutAuthor = () => {
            isAuthor = false;
            document.getElementById('authorPanel').classList.remove('open');
            toast('Author panel locked');
        };

        function showAddBookForm(bookData = null) {
            const isEdit = !!bookData;
            const body = document.getElementById('authorPanelBody');
            body.innerHTML = `
            <h4 style="margin-bottom:14px">${isEdit?'Edit Book':'Add New Book'}</h4>
            <div class="form-grid">
              <div class="fg"><label>Title *</label><input id="abTitle" value="${esc(bookData?.title||'')}"></div>
              <div class="fg"><label>Author *</label><input id="abAuthor" value="${esc(bookData?.author||'Bibek Patra')}"></div>
              <div class="fg"><label>Publish Date</label><input type="date" id="abDate" value="${esc(bookData?.publishDate||'')}"></div>
              <div class="fg"><label>Category</label><select id="abCat">${CATS.map(c=>`<option ${c===bookData?.category?'selected':''}>${c}</option>`).join('')}</select></div>
              <div class="fg"><label>Price (₹)</label><input id="abPrice" type="number" value="${bookData?.price||0}"></div>
              <div class="fg"><label>Discount (%)</label><input id="abDisc" type="number" min="0" max="90" value="${bookData?.discount||0}"></div>
            </div>
            <div class="check-row"><input type="checkbox" id="abFree" ${bookData?.isFree?'checked':''}><label>📖 FREE book</label></div>
            <div class="fg" style="margin-bottom:10px"><label>Cover Image</label><input type="file" id="abCover" accept="image/*"></div>
            <div class="fg" style="margin-bottom:10px"><label>PDF URL</label><input id="abPdf" value="${esc(bookData?.pdfUrl||'')}"></div>
            <div class="fg" style="margin-bottom:10px"><label>Upload PDF (optional)</label><input type="file" id="abPdfFile" accept="application/pdf"></div>
            <div class="fg" style="margin-bottom:10px"><label>Description</label><textarea id="abDesc" rows="3">${esc(bookData?.description||'')}</textarea></div>
            <button class="btn btn-forest" onclick="window._submitBook('${bookData?.id||''}')">💾 ${isEdit?'Update':'Publish'} Book</button>
            ${isEdit?`<button class="btn btn-ghost" onclick="showAddBookForm()">Cancel Edit</button>`:''}
            <hr style="margin:18px 0;border-color:var(--border)">
            <p style="font-size:0.78rem;color:var(--ink-3)"><strong>All Books:</strong> Click ✏️ on any book card to edit, or use the detail view.</p>`;
        }
        window._submitBook = async (editId) => {
            const title = document.getElementById('abTitle').value.trim();
            const author = document.getElementById('abAuthor').value.trim();
            if (!title || !author) { toast('Title & Author required', 'err'); return; }
            const isFree = document.getElementById('abFree').checked;
            const price = parseFloat(document.getElementById('abPrice').value) || 0;
            const discount = parseInt(document.getElementById('abDisc').value) || 0;
            const category = document.getElementById('abCat').value;
            const publishDate = document.getElementById('abDate').value;
            const description = document.getElementById('abDesc').value.trim();
            const pdfUrl = document.getElementById('abPdf').value.trim();
            const coverFile = document.getElementById('abCover').files[0];
            const pdfFile = document.getElementById('abPdfFile').files[0];
            let coverImage = '';
            let uploadedPdfUrl = pdfUrl;
            try {
                if (coverFile) coverImage = await readFileAsDataURL(coverFile);
                if (pdfFile) uploadedPdfUrl = await uploadPdf(pdfFile);
                const bookPayload = {
                    title,
                    author,
                    category,
                    publishDate,
                    description,
                    isFree,
                    price,
                    discount,
                    coverImage: coverImage || (editId ? (books.find(b => b.id === editId)?.coverImage || '') :
                        ''),
                    pdfUrl: uploadedPdfUrl,
                    updatedAt: new Date().toISOString()
                };
                if (editId) {
                    await updateDoc(doc(db, 'books', editId), bookPayload);
                    toast('✅ Book updated');
                } else {
                    bookPayload.createdAt = new Date().toISOString();
                    await addDoc(collection(db, 'books'), bookPayload);
                    toast('✅ Book published');
                }
                showAddBookForm();
            } catch (e) { toast('❌ Error: ' + e.message, 'err'); }
        };

        // ── EDIT / DELETE BOOK ──────────────────────
        function openEditModal(bookId) {
            const b = books.find(x => x.id === bookId);
            if (!b) return;
            document.getElementById('editId').value = bookId;
            document.getElementById('eTitle').value = b.title || '';
            document.getElementById('eAuthor').value = b.author || '';
            document.getElementById('eDate').value = b.publishDate || '';
            document.getElementById('eCat').value = b.category || 'Fiction';
            document.getElementById('ePrice').value = b.price || 0;
            document.getElementById('eDisc').value = b.discount || 0;
            document.getElementById('eFree').checked = b.isFree || false;
            document.getElementById('ePdf').value = b.pdfUrl || '';
            document.getElementById('eDesc').value = b.description || '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

        async function confirmEdit() {
            const bookId = document.getElementById('editId').value;
            if (!bookId) return;
            const coverFile = document.getElementById('eCover').files[0];
            const pdfFile = document.getElementById('ePdfFile').files[0];
            let coverImage = books.find(b => b.id === bookId)?.coverImage || '';
            let pdfUrl = document.getElementById('ePdf').value.trim();
            try {
                if (coverFile) coverImage = await readFileAsDataURL(coverFile);
                if (pdfFile) pdfUrl = await uploadPdf(pdfFile);
                const payload = {
                    title: document.getElementById('eTitle').value.trim(),
                    author: document.getElementById('eAuthor').value.trim(),
                    publishDate: document.getElementById('eDate').value,
                    category: document.getElementById('eCat').value,
                    price: parseFloat(document.getElementById('ePrice').value) || 0,
                    discount: parseInt(document.getElementById('eDisc').value) || 0,
                    isFree: document.getElementById('eFree').checked,
                    description: document.getElementById('eDesc').value.trim(),
                    coverImage,
                    pdfUrl,
                    updatedAt: new Date().toISOString()
                };
                await updateDoc(doc(db, 'books', bookId), payload);
                toast('✅ Book updated');
                closeEditModal();
            } catch (e) { toast('❌ Error: ' + e.message, 'err'); }
        }

        async function deleteBook(bookId) {
            if (!confirm('Delete this book permanently?')) return;
            try {
                await deleteDoc(doc(db, 'books', bookId));
                toast('🗑️ Book deleted');
            } catch (e) { toast('❌ Error: ' + e.message, 'err'); }
        }

        // ── DROPDOWN ────────────────────────────────
        function toggleDropdown() {
            document.getElementById('dropdownWrap').classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            const wrap = document.getElementById('dropdownWrap');
            if (!wrap.contains(e.target)) wrap.classList.remove('open');
        });

        function handleAccountClick() {
            document.getElementById('dropdownWrap').classList.remove('open');
            openAuthModal();
        }

        function handleAuthorClick() {
            document.getElementById('dropdownWrap').classList.remove('open');
            toggleAuthorPanel();
        }

        // ── AUTH ────────────────────────────────────
        function openAuthModal() {
            document.getElementById('authModal').style.display = 'flex';
            renderAuthForm('login');
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.auth-tab[data-tab="login"]').classList.add('active');
        }

        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        function renderAuthForm(tab) {
            const container = document.getElementById('authFormContainer');
            if (tab === 'login') {
                container.innerHTML = `
              <div class="fg" style="margin-bottom:10px"><label>Email</label><input type="email" id="authEmail" placeholder="your@email.com"></div>
              <div class="fg" style="margin-bottom:10px"><label>Password</label><input type="password" id="authPass" placeholder="••••••"></div>
              <button class="btn btn-forest" style="width:100%;justify-content:center" id="authSubmitBtn">🔐 Login</button>
              <p style="margin-top:10px;font-size:0.78rem;color:var(--ink-3);cursor:pointer" id="forgotLink">Forgot password?</p>`;
                document.getElementById('authSubmitBtn').onclick = async () => {
                    const em = document.getElementById('authEmail').value.trim();
                    const pw = document.getElementById('authPass').value;
                    if (!em || !pw) { toast('Fill all fields', 'err'); return; }
                    try {
                        await signInWithEmailAndPassword(auth, em, pw);
                        closeAuthModal();
                        toast('✅ Welcome back!');
                    } catch (e) { toast('❌ ' + e.message, 'err'); }
                };
                document.getElementById('forgotLink').onclick = async () => {
                    const em = document.getElementById('authEmail').value.trim();
                    if (!em) { toast('Enter email first', 'err'); return; }
                    try {
                        await sendPasswordResetEmail(auth, em);
                        toast('📧 Reset email sent');
                    } catch (e) { toast('❌ ' + e.message, 'err'); }
                };
            } else {
                container.innerHTML = `
              <div class="fg" style="margin-bottom:10px"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"></div>
              <div class="fg" style="margin-bottom:10px"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 characters"></div>
              <button class="btn btn-forest" style="width:100%;justify-content:center" id="regSubmitBtn">✨ Create Account</button>`;
                document.getElementById('regSubmitBtn').onclick = async () => {
                    const em = document.getElementById('regEmail').value.trim();
                    const pw = document.getElementById('regPass').value;
                    if (!em || !pw) { toast('Fill all fields', 'err'); return; }
                    if (pw.length < 6) { toast('Password min 6 chars', 'err'); return; }
                    try {
                        await createUserWithEmailAndPassword(auth, em, pw);
                        closeAuthModal();
                        toast('✅ Account created!');
                    } catch (e) { toast('❌ ' + e.message, 'err'); }
                };
            }
        }
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove(
                    'active'));
                this.classList.add('active');
                renderAuthForm(this.dataset.tab);
            });
        });

        function requireAuthThen(callback) {
            if (currentUser) { callback(); return; }
            openAuthModal();
            toast('Please login first', 'err');
        }

        // ── AUTH STATE LISTENER ─────────────────────
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            const accBtn = document.getElementById('dropAccount');
            if (user) {
                accBtn.textContent = '👤 ' + (user.email || 'My Account');
                accBtn.style.color = 'var(--forest)';
                await loadUserData(user.uid);
            } else {
                accBtn.textContent = '👤 Account';
                accBtn.style.color = '';
                userWishlist = [];
                userCart = [];
                userPurchased = [];
                updateDots();
                filterBooks();
            }
        });

        // ── BOOKS LISTENER ──────────────────────────
        const booksQuery = query(collection(db, 'books'), orderBy('createdAt', 'desc'));
        onSnapshot(booksQuery, (snapshot) => {
            books = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            updateHeroStats();
            filterBooks();
        }, (err) => {
            console.warn('Firestore books listener error:', err.message);
            books = [];
            updateHeroStats();
            filterBooks();
        });

        function updateHeroStats() {
            const total = books.length;
            const freeCount = books.filter(b => b.isFree).count;
            const catCount = new Set(books.map(b => b.category).filter(Boolean)).size;
            document.getElementById('heroStats').innerHTML = `
            <div class="hero-stat"><strong>${total}</strong><span>Books</span></div>
            <div class="hero-stat"><strong>${catCount}</strong><span>Categories</span></div>
            <div class="hero-stat"><strong>${freeCount||0}</strong><span>Free Titles</span></div>`;
        }

        // ── INIT ────────────────────────────────────
        function init() {
            document.getElementById('siteFooter').textContent = getCopy();
            renderCatPills();
            filterBooks();
            updateHeroStats();
            // Expose global functions for inline onclick handlers
            window.openCart = openCart;
            window.closeCart = closeCart;
            window.openWishlist = openWishlist;
            window.closeWishModal = closeWishModal;
            window.openBuy = openBuy;
            window.closeBuy = closeBuy;
            window.openDetailModal = openDetailModal;
            window.closeDetailModal = closeDetailModal;
            window.toggleAuthorPanel = toggleAuthorPanel;
            window.openAuthModal = openAuthModal;
            window.closeAuthModal = closeAuthModal;
            window.requireAuthThen = requireAuthThen;
            window.toggleDropdown = toggleDropdown;
            window.handleAccountClick = handleAccountClick;
            window.handleAuthorClick = handleAuthorClick;
            window.openEditModal = openEditModal;
            window.closeEditModal = closeEditModal;
            window.confirmEdit = confirmEdit;
            window.deleteBook = deleteBook;
            window.filterBooks = filterBooks;
        }
        init();
        console.log('📚 Bibek Books ready — search beside "All Books", account & author in 3-dot menu.');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bibek Books | Digital Bookstore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1510;
  --ink-2: #4a4035;
  --ink-3: #8a7a6a;
  --paper: #faf7f2;
  --paper-2: #f2ede4;
  --paper-3: #e8e0d4;
  --forest: #2c5f45;
  --forest-l: #3d7d5c;
  --forest-pale: #e8f2ec;
  --amber: #c07c2a;
  --amber-l: #f5e4c8;
  --ruby: #b03030;
  --ruby-l: #fae8e8;
  --sapphire: #1e4d7a;
  --sapphire-l: #e4eef8;
  --card: #ffffff;
  --border: rgba(0,0,0,0.09);
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.18);
  --r: 14px;
  --r-sm: 8px;
  --t: 0.25s cubic-bezier(0.4,0,0.2,1);
  --nav-h: 66px;
}
*{margin:0;padding:0;box-sizing:border-box;}
::selection{background:var(--forest-pale);color:var(--forest);}

body {
  font-family:'Outfit',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.6;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}

/* ─── NAVBAR ─── */
.nav {
  position:sticky;top:0;z-index:200;
  height:var(--nav-h);
  background:rgba(250,247,242,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 16px;gap:12px;
  width:100%;
}
.nav-logo {
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:700;
  color:var(--forest);
  display:flex;align-items:center;gap:10px;
  text-decoration:none;white-space:nowrap;letter-spacing:-0.3px;
}
.nav-logo-mark {
  width:38px;height:38px;
  background:linear-gradient(135deg,var(--forest),var(--amber));
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.15rem;flex-shrink:0;
  box-shadow:0 3px 10px rgba(44,95,69,0.35);
}
.nav-search {
  flex:1;max-width:480px;
  position:relative;margin:0 auto;
}
.nav-search input {
  width:100%;
  padding:10px 18px 10px 46px;
  border:1.5px solid var(--border);
  border-radius:50px;
  font-size:0.9rem;font-family:inherit;
  background:var(--card);color:var(--ink);
  outline:none;transition:var(--t);
}
.nav-search input:focus {
  border-color:var(--forest);
  box-shadow:0 0 0 4px var(--forest-pale);
}
.nav-search-icon {
  position:absolute;left:16px;top:50%;
  transform:translateY(-50%);
  color:var(--ink-3);pointer-events:none;font-size:1rem;
}
.nav-btns{display:flex;gap:6px;align-items:center;}
.nav-btn {
  height:40px;border-radius:50px;border:none;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:6px;
  transition:var(--t);
  font-family:inherit;font-weight:500;font-size:0.82rem;
  padding:0 14px;background:transparent;color:var(--ink-2);
  position:relative;
}
.nav-btn:hover{background:var(--paper-3);color:var(--ink);}
.nav-btn.author-active{background:var(--amber-l);color:var(--amber);}
.nav-btn-icon{width:40px;padding:0;}
.wish-dot {
  position:absolute;top:6px;right:6px;
  width:9px;height:9px;border-radius:50%;
  background:var(--ruby);border:2px solid var(--paper);
  display:none;
}
.user-btn {
  background:var(--forest-pale);
  color:var(--forest);
  font-weight:600;
  min-width:100px;
}

/* ─── HERO ─── */
.hero {
  text-align:center;
  padding:52px 24px 36px;
  position:relative;
}
.hero::before {
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:600px;height:200px;
  background:radial-gradient(ellipse,rgba(44,95,69,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.hero-badge {
  display:inline-flex;align-items:center;gap:6px;
  background:var(--forest-pale);color:var(--forest);
  padding:5px 14px;border-radius:50px;
  font-size:0.78rem;font-weight:600;letter-spacing:0.4px;
  margin-bottom:18px;border:1px solid rgba(44,95,69,0.2);
}
.hero h1 {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.2rem,5vw,3.6rem);
  font-weight:700;letter-spacing:-0.8px;
  color:var(--ink);margin-bottom:12px;line-height:1.1;
}
.hero h1 em{color:var(--forest);font-style:italic;}
.hero p{
  color:var(--ink-3);font-size:1.02rem;
  max-width:460px;margin:0 auto 28px;
}
.hero-stats {
  display:flex;justify-content:center;gap:32px;flex-wrap:wrap;
}
.hero-stat {
  text-align:center;
}
.hero-stat strong {
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:1.5rem;font-weight:700;color:var(--forest);
}
.hero-stat span{font-size:0.78rem;color:var(--ink-3);}

/* ─── MAIN ─── */
.main {max-width:1280px;margin:0 auto;padding:0 16px 80px;}

/* ─── AUTHOR PANEL ─── */
.author-panel {
  background:var(--card);
  border:1.5px solid var(--amber-l);
  border-radius:var(--r);
  padding:28px;margin-bottom:32px;
  display:none;
  box-shadow:var(--shadow-sm);
  animation:slideDown 0.3s ease;
}
.author-panel.open{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.panel-header {
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:22px;flex-wrap:wrap;gap:12px;
}
.panel-title {
  font-family:'Cormorant Garamond',serif;
  font-size:1.3rem;font-weight:700;color:var(--amber);
  display:flex;align-items:center;gap:8px;
}

/* Login Box for author */
.login-box {
  max-width:380px;
}
.login-box p{font-size:0.88rem;color:var(--ink-3);margin-bottom:16px;}
.input-row{display:flex;gap:10px;align-items:center;}
.input-row input {
  flex:1;padding:10px 16px;
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  font-family:inherit;font-size:0.9rem;
  background:#fff;color:var(--ink);
  outline:none;transition:var(--t);
}
.input-row input:focus{border-color:var(--forest);box-shadow:0 0 0 3px var(--forest-pale);}

/* Forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid .span2{grid-column:1/-1;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-weight:600;font-size:0.78rem;color:var(--ink-3);letter-spacing:0.3px;text-transform:uppercase;}
.fg input,.fg textarea,.fg select {
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  font-family:inherit;font-size:0.88rem;
  background:#fff;color:var(--ink);
  outline:none;transition:var(--t);resize:vertical;
}
.fg input:focus,.fg textarea:focus,.fg select:focus{
  border-color:var(--forest);
  box-shadow:0 0 0 3px var(--forest-pale);
}
.check-row {
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);background:#fff;
}
.check-row input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--forest);}
.check-row label{margin:0;font-weight:500;font-size:0.88rem;cursor:pointer;}
.divider{border:none;border-top:1px solid var(--border);margin:22px 0;}
.manage-scroll{max-height:260px;overflow-y:auto;margin-top:10px;}
.manage-item {
  display:flex;align-items:center;justify-content:space-between;
  background:var(--paper-2);border-radius:50px;
  padding:9px 16px;margin-bottom:8px;
  border:1px solid var(--border);gap:10px;
  transition:var(--t);
}
.manage-item:hover{border-color:#ccc;}
.mi-info{flex:1;min-width:0;}
.mi-title{font-weight:600;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mi-sub{font-size:0.74rem;color:var(--ink-3);}
.mi-actions{display:flex;gap:6px;flex-shrink:0;}

/* ─── SECTION ─── */
.section-bar {
  display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;
  gap:14px;margin-bottom:22px;
}
.section-title {
  font-family:'Cormorant Garamond',serif;
  font-size:1.6rem;font-weight:700;
  color:var(--ink);
}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill {
  padding:6px 18px;border-radius:50px;
  border:1.5px solid var(--border);
  background:var(--card);
  cursor:pointer;font-size:0.82rem;font-family:inherit;
  transition:var(--t);color:var(--ink-3);
  font-weight:500;white-space:nowrap;
}
.pill:hover{border-color:#bbb;color:var(--ink);}
.pill.on{background:var(--forest);color:#fff;border-color:var(--forest);}

/* ─── BOOK GRID ─── */
.book-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(min(200px,45%),1fr));
  gap:16px;
  width:100%;
}
.book-card {
  background:var(--card);border-radius:var(--r);
  overflow:hidden;border:1px solid var(--border);
  transition:var(--t);cursor:pointer;
  display:flex;flex-direction:column;
  box-shadow:var(--shadow-xs);position:relative;
}
.book-card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-lg);
  border-color:rgba(0,0,0,0.16);
}
.book-cover {
  width:100%;aspect-ratio:2/2.9;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;font-weight:700;color:#fff;
  text-align:center;padding:20px;
  line-height:1.3;position:relative;overflow:hidden;
}
.book-cover img {
  width:100%;height:100%;object-fit:cover;
  position:absolute;top:0;left:0;
}
.cover-text{position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,0.4);}
.book-badge {
  position:absolute;top:10px;left:10px;z-index:2;
  padding:3px 10px;border-radius:50px;
  font-size:0.65rem;font-weight:700;letter-spacing:0.6px;
}
.badge-free{background:var(--forest);color:#fff;}
.badge-disc{background:var(--ruby);color:#fff;}
.badge-read{
  position:absolute;top:10px;right:10px;z-index:2;
  background:rgba(0,0,0,0.6);color:#fff;
  padding:3px 10px;border-radius:50px;
  font-size:0.65rem;font-weight:700;letter-spacing:0.8px;
  opacity:0;transform:translateY(-4px);transition:var(--t);
}
.book-card:hover .badge-read{opacity:1;transform:translateY(0);}
.book-info{padding:14px 14px 16px;flex:1;display:flex;flex-direction:column;gap:4px;}
.book-title{
  font-weight:600;font-size:0.92rem;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.book-author{font-size:0.76rem;color:var(--ink-3);}
.book-cat{font-size:0.7rem;color:#aaa;margin-top:1px;}
.price-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:6px;}
.price-now{font-weight:800;font-size:1rem;color:var(--forest);}
.price-was{font-size:0.73rem;text-decoration:line-through;color:#aaa;}
.card-btns{display:flex;gap:7px;margin-top:10px;}
.c-btn {
  flex:1;border:1px solid var(--border);
  padding:7px 8px;border-radius:50px;
  font-size:0.74rem;font-weight:500;
  display:inline-flex;align-items:center;
  justify-content:center;gap:4px;
  cursor:pointer;transition:var(--t);
  font-family:inherit;background:var(--paper);
  color:var(--ink);text-decoration:none;
}
.c-btn:hover{background:var(--paper-3);}
.c-btn.wishlisted{color:var(--ruby);border-color:var(--ruby-l);background:var(--ruby-l);}
.c-btn.buy-btn{background:var(--forest);color:#fff;border-color:var(--forest);}
.c-btn.buy-btn:hover{background:var(--forest-l);}

/* ─── EMPTY ─── */
.empty {
  text-align:center;padding:70px 20px;
  grid-column:1/-1;color:var(--ink-3);
}
.empty .empty-icon{font-size:3.5rem;margin-bottom:16px;}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;margin-bottom:6px;color:#aaa;}
.empty p{font-size:0.88rem;color:#bbb;}

/* ─── MODAL BASE ─── */
.overlay {
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  padding:20px;animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box {
  background:#fff;border-radius:var(--r);
  width:100%;max-width:900px;
  max-height:92vh;display:flex;flex-direction:column;
  box-shadow:var(--shadow-lg);animation:popIn 0.28s ease;overflow:hidden;
}
@keyframes popIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-head {
  display:flex;align-items:center;
  justify-content:space-between;
  padding:18px 24px;border-bottom:1px solid var(--border);gap:14px;
}
.modal-head h3{
  font-family:'Cormorant Garamond',serif;
  font-size:1.2rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.modal-close {
  width:36px;height:36px;border-radius:50%;
  border:none;background:var(--paper-2);cursor:pointer;
  font-size:1rem;display:flex;align-items:center;
  justify-content:center;transition:var(--t);flex-shrink:0;
}
.modal-close:hover{background:var(--paper-3);}
.modal-body{flex:1;overflow:auto;min-height:300px;background:#f5f3f0;}
.modal-body iframe{width:100%;height:62vh;border:none;display:block;touch-action:pan-x pan-y;}
.modal-foot{
  padding:14px 22px;border-top:1px solid var(--border);
  display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;
}

/* Card modals */
.card-modal {
  background:#fff;border-radius:20px;
  max-width:540px;width:90%;max-height:86vh;
  overflow-y:auto;padding:28px;
  box-shadow:var(--shadow-lg);animation:popIn 0.28s ease;
}
.card-modal h3{
  font-family:'Cormorant Garamond',serif;
  font-size:1.25rem;font-weight:700;
  margin-bottom:20px;
  display:flex;justify-content:space-between;align-items:center;
}

/* Wishlist / cart items */
.wish-item {
  display:flex;align-items:center;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.wish-item:last-child{border-bottom:none;}
.wish-cover {
  width:44px;height:62px;border-radius:6px;
  object-fit:cover;flex-shrink:0;
}
.wish-cover-grad {
  width:44px;height:62px;border-radius:6px;
  flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:0.6rem;
  color:#fff;text-align:center;padding:4px;
  font-family:'Cormorant Garamond',serif;font-weight:700;
  line-height:1.2;
}

/* ─── BUTTONS ─── */
.btn {
  padding:9px 22px;border-radius:50px;border:none;
  cursor:pointer;font-family:inherit;font-weight:600;
  font-size:0.85rem;transition:var(--t);
  display:inline-flex;align-items:center;gap:7px;
  text-decoration:none;
}
.btn-forest{background:var(--forest);color:#fff;}
.btn-forest:hover{background:var(--forest-l);transform:translateY(-1px);box-shadow:0 4px 14px rgba(44,95,69,0.3);}
.btn-outline{background:#fff;color:var(--forest);border:1.5px solid var(--forest);}
.btn-outline:hover{background:var(--forest-pale);}
.btn-amber{background:var(--amber);color:#fff;}
.btn-amber:hover{background:#a86b20;}
.btn-ruby{background:var(--ruby);color:#fff;}
.btn-ruby:hover{background:#962828;}
.btn-ghost{background:var(--paper-2);color:var(--ink-2);}
.btn-ghost:hover{background:var(--paper-3);}
.btn-sm{padding:6px 14px;font-size:0.78rem;}

/* ─── TOAST ─── */
.toast-wrap {
  position:fixed;bottom:24px;left:24px;z-index:999;
  display:flex;flex-direction:column;gap:8px;
}
.toast {
  padding:11px 20px;border-radius:50px;color:#fff;
  font-weight:500;font-size:0.86rem;
  animation:slideInL 0.3s ease,fadeOut 0.3s ease 2.7s forwards;
  box-shadow:var(--shadow-md);max-width:360px;
  display:flex;align-items:center;gap:8px;
}
.toast.ok{background:#2d7a52;}
.toast.err{background:#b03030;}
.toast.inf{background:#1e5c9a;}
@keyframes slideInL{from{transform:translateX(-120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateY(6px)}}

/* ─── FOOTER ─── */
.site-footer {
  background:var(--paper-3);
  border-top:1px solid var(--border);
  padding:30px 24px;text-align:center;
  font-size:0.74rem;color:var(--ink-3);
  white-space:pre-line;margin-top:60px;
  line-height:1.8;
}

/* ─── AUTH MODAL (readable style) ─── */
.auth-overlay {
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.auth-card {
  background:var(--card);
  border-radius:28px;
  max-width:420px;
  width:90%;
  padding:32px 28px;
  box-shadow:var(--shadow-lg);
  text-align:center;
}
.auth-card h2 {
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem;
  color:var(--forest);
  margin-bottom:16px;
}
.auth-tabs {
  display:flex;
  gap:12px;
  margin-bottom:24px;
  border-bottom:2px solid var(--border);
  padding-bottom:8px;
}
.auth-tab {
  flex:1;
  background:none;
  border:none;
  font-weight:600;
  font-size:1rem;
  cursor:pointer;
  color:var(--ink-3);
  font-family:inherit;
  transition:var(--t);
}
.auth-tab.active {color:var(--forest); border-bottom:2px solid var(--forest); margin-bottom:-10px;}
.auth-form .fg {margin-bottom:16px; text-align:left;}
.auth-form input {width:100%;}
.auth-btn {
  background:var(--forest);
  color:#fff;
  width:100%;
  justify-content:center;
}
.auth-foot {
  margin-top:20px;
  font-size:0.8rem;
  color:var(--ink-3);
}
.auth-foot button {
  background:none;
  border:none;
  color:var(--forest);
  font-weight:600;
  cursor:pointer;
}

/* Responsive */
@media(max-width:768px){
  .nav{padding:0 16px;gap:12px;}
  .nav-logo{font-size:1.35rem;}
  .book-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .main{padding:0 14px 60px;}
  .form-grid{grid-template-columns:1fr;}
  .form-grid .span2{grid-column:1;}
  .hero{padding:36px 16px 24px;}
}
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>

<nav class="nav">
  <a class="nav-logo" href="#"><div class="nav-logo-mark">📚</div>Bibek Books</a>
  <div class="nav-search"><span class="nav-search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search titles, authors, categories…" oninput="filterBooks()"></div>
  <div class="nav-btns">
    <button class="nav-btn nav-btn-icon" title="Cart" onclick="requireAuthThen(()=>openCart())">🛒<span class="wish-dot" id="cartDot"></span></button>
    <button class="nav-btn nav-btn-icon" title="Wishlist" onclick="requireAuthThen(()=>openWishModal())">❤️<span class="wish-dot" id="wishDot"></span></button>
    <button class="nav-btn user-btn" id="userStatusBtn" onclick="openAuthModal()">👤 Account</button>
    <button class="nav-btn nav-btn-icon" id="authorBtn" title="Author Studio" onclick="toggleAuthorPanel()">✍️</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-badge">✨ Discover · Read · Collect</div>
  <h1>Your Personal<br><em>Digital Library</em></h1>
  <p>Curated books by Bibek — buy, read free titles, and save your favourites, all in one place.</p>
  <div class="hero-stats" id="heroStats"></div>
</div>

<div class="main">
  <div class="author-panel" id="authorPanel">
    <div class="panel-header"><div class="panel-title">✍️ Author Studio</div><div id="authorPanelHead"></div></div>
    <div id="authorPanelBody"></div>
  </div>

<!-- MODALS -->

<div id="authModal" style="display:none" class="auth-overlay" onclick="if(event.target===this) closeAuthModal()"><div class="auth-card"><div class="auth-tabs"><button class="auth-tab active" data-tab="login">Login</button><button class="auth-tab" data-tab="register">Create Account</button></div><div id="authFormContainer"></div><div class="auth-foot" id="authFootMsg"></div></div></div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9vp6iqR0O2KOKguHBKs6ZWCWXN1oEzAs",
  authDomain: "bibek-media-143ba.firebaseapp.com",
  projectId: "bibek-media-143ba",
  storageBucket: "bibek-media-143ba.firebasestorage.app",
  messagingSenderId: "135854036939",
  appId: "1:135854036939:web:35d2b18c16c6037ef7484e"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

// globals
let books = [], currentUser = null, userWishlist = [], userCart = [], userPurchased = [], isAuthor = false, activeCat = 'All';
const SK_PASS = 'bibek_pass', SK_COPY = 'bibek_copy', DEF_PASS = 'author123', DEF_COPY = `Copyright © 2026 by Bibek Patra\nBibek Books · Digital Bookstore`;
const CATS = ['Spiritual','Fiction','Non-Fiction','Science','History','Poetry','Business'];
const PALETTES = [['#2c5f45','#4a9e72'],['#7a3b1e','#c47a4a'],['#1a4a7a','#4a90c8'],['#5a2d7a','#9a55c8'],['#a82020','#d86060'],['#1e6070','#3ab0c8'],['#3a4f60','#6a90aa'],['#4a3020','#8a7050']];
const RAZORPAY_KEY = 'rzp_test_YourKeyHere';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const toast = (msg,type='ok')=>{ const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; document.getElementById('toastWrap').appendChild(t); setTimeout(()=>t.remove(),3300); };
const calcPrice = (b) => { if(b.isFree) return {cur:0, orig:b.price, disc:0}; const d=Math.max(0,Math.min(90,b.discount||0)); return {cur: d>0?Math.round(b.price*(1-d/100)):b.price, orig:b.price, disc:d}; };
const readFile = f => new Promise((res,rej)=>{ if(!f){res('');return;} const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const MAX=600; let w=img.width,h=img.height; if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} } const canvas=document.createElement('canvas'); canvas.width=w;canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); res(canvas.toDataURL('image/jpeg',0.75)); }; img.onerror=()=>rej(); img.src=r.result; }; r.readAsDataURL(f); });
const uploadPdf = async (file) => { if(!file)return ''; const safe = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`; const refPath = ref(storage, `books/pdfs/${safe}`); await uploadBytes(refPath, file); return await getDownloadURL(refPath); };
async function loadUserData(uid) { if(!uid) return; const ref = doc(db, 'userData', uid); const snap = await getDoc(ref); if(snap.exists()){ const d=snap.data(); userWishlist=d.wishlist||[]; userCart=d.cart||[]; userPurchased=d.purchased||[]; } else { userWishlist=[]; userCart=[]; userPurchased=[]; await setDoc(ref, {wishlist:[], cart:[], purchased:[]}); } updateDots(); filterBooks(); }
async function saveUserField(uid, field, val) { if(!uid) return; await setDoc(doc(db,'userData',uid), {[field]: val}, {merge:true}); }
window.toggleWish = async function(id) { if(!currentUser) return openAuthModal(); if(userWishlist.includes(id)){ userWishlist = userWishlist.filter(x=>x!==id); await saveUserField(currentUser.uid,'wishlist',userWishlist); toast('Removed from wishlist','inf'); } else { userWishlist.push(id); await saveUserField(currentUser.uid,'wishlist',userWishlist); toast('❤️ Added to wishlist'); } updateDots(); filterBooks(); };
window.addToCart = async function(id) { if(!currentUser) return openAuthModal(); const b=books.find(x=>x.id===id); if(!b||b.isFree) return; if(!userCart.includes(id)) { userCart.push(id); await saveUserField(currentUser.uid,'cart',userCart); toast('🛒 Added to cart'); } updateDots(); filterBooks(); };
window.removeFromCart = async function(id) { if(!currentUser) return; userCart = userCart.filter(x=>x!==id); await saveUserField(currentUser.uid,'cart',userCart); updateDots(); filterBooks(); openCart(); };
async function markPurchased(ids) { if(!currentUser) return; const newPurchased = [...new Set([...userPurchased, ...ids])]; userPurchased = newPurchased; await saveUserField(currentUser.uid,'purchased',userPurchased); userCart = userCart.filter(x=>!ids.includes(x)); await saveUserField(currentUser.uid,'cart',userCart); updateDots(); filterBooks(); }

// Auth UI
window.openAuthModal = () => { document.getElementById('authModal').style.display='flex'; renderAuthForm('login'); };
window.closeAuthModal = () => document.getElementById('authModal').style.display='none';
function renderAuthForm(tab){ const container = document.getElementById('authFormContainer'); const tabs = document.querySelectorAll('.auth-tab'); tabs.forEach(t=>t.classList.remove('active')); if(tab==='login'){ document.querySelector('.auth-tab[data-tab="login"]').classList.add('active'); container.innerHTML = `<div class="auth-form"><div class="fg"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div><div class="fg"><label>Password</label><input type="password" id="authPassword" placeholder="••••••"></div><button class="btn auth-btn" id="doLoginBtn">Login</button><div class="auth-foot"><button id="forgotBtn">Forgot password?</button></div></div>`; document.getElementById('doLoginBtn')?.addEventListener('click', ()=>handleLogin()); document.getElementById('forgotBtn')?.addEventListener('click', ()=>handleForgot()); } else { document.querySelector('.auth-tab[data-tab="register"]').classList.add('active'); container.innerHTML = `<div class="auth-form"><div class="fg"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"></div><div class="fg"><label>Password (min 6)</label><input type="password" id="regPassword" placeholder="••••••"></div><button class="btn auth-btn" id="doRegisterBtn">Create Account</button></div>`; document.getElementById('doRegisterBtn')?.addEventListener('click', ()=>handleRegister()); } }
async function handleLogin(){ const email = document.getElementById('authEmail')?.value.trim(), pwd = document.getElementById('authPassword')?.value; if(!email||!pwd) return toast('Fill all fields','err'); try { await signInWithEmailAndPassword(auth, email, pwd); closeAuthModal(); toast(`Welcome ${email.split('@')[0]}!`); } catch(e){ toast(e.message,'err'); } }
async function handleRegister(){ const email = document.getElementById('regEmail')?.value.trim(), pwd = document.getElementById('regPassword')?.value; if(!email||!pwd) return toast('Fill all','err'); if(pwd.length<6) return toast('Password min 6 chars','err'); try { await createUserWithEmailAndPassword(auth, email, pwd); closeAuthModal(); toast('Account created!'); } catch(e){ toast(e.message,'err'); } }
async function handleForgot(){ const email = prompt('Enter your email for reset:'); if(!email) return; try { await sendPasswordResetEmail(auth, email); toast('Reset email sent','inf'); } catch(e){ toast(e.message,'err'); } }
window.requireAuthThen = (cb) => { if(currentUser) cb(); else openAuthModal(); };
onAuthStateChanged(auth, async (user) => { currentUser = user; const btn = document.getElementById('userStatusBtn'); if(user){ btn.innerHTML = `👤 ${user.email.split('@')[0]}`; btn.onclick = () => signOut(auth); await loadUserData(user.uid); } else { btn.innerHTML = `👤 Account`; btn.onclick = () => openAuthModal(); userWishlist=[]; userCart=[]; userPurchased=[]; updateDots(); filterBooks(); } });

// Book rendering (original logic)
function filterBooks(){ const q = document.getElementById('searchInput').value.toLowerCase(); let list = activeCat==='All'?books:books.filter(b=>b.category===activeCat); if(q) list = list.filter(b=>b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)); document.getElementById('sectionTitle').textContent = q?`Results for "${q}"`:activeCat==='All'?'All Books':activeCat; renderPills(); renderBooks(list); updateStats(); }
function renderBooks(list){ const grid=document.getElementById('bookGrid'); if(!list.length){ grid.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><h3>No books</h3></div>`; return; } grid.innerHTML = list.map(b=>bookCard(b)).join(''); }
function bookCard(b){ const{cur,disc}=calcPrice(b); const saved = currentUser && userWishlist.includes(b.id); const carted = currentUser && userCart.includes(b.id); const ci=(b.coverColor??b.title.charCodeAt(0))%PALETTES.length; const[c1,c2]=PALETTES[ci]; const coverHtml = b.cover?`<img src="${esc(b.cover)}" style="width:100%;height:100%;object-fit:cover;position:absolute">`:`<span class="cover-text">${esc(b.title)}</span>`; const topBadge = b.isFree?`<span class="book-badge badge-free">FREE</span>`:(disc>0?`<span class="book-badge badge-disc">${disc}% OFF</span>`:''); const readBadge = b.pdfUrl?`<span class="badge-read">PREVIEW</span>`:''; const priceSection = b.isFree?`<div class="price-row"><span>📖 Free</span></div>`:`<div class="price-row"><span class="price-now">₹${cur}</span>${disc>0?`<span class="price-was">₹${b.price}</span>`:''}</div>`; const readBtn = (b.isFree || (currentUser && userPurchased.includes(b.id))) && b.pdfUrl ? `<a class="c-btn" href="${esc(b.pdfUrl)}" target="_blank" onclick="event.stopPropagation()">Read</a>` : `<button class="c-btn" onclick="event.stopPropagation();requireAuthThen(()=>openBuy('${b.id}'))">Buy</button>`; return `<div class="book-card" onclick="openDetail('${b.id}')"><div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})">${coverHtml}${topBadge}${readBadge}</div><div class="book-info"><div class="book-title">${esc(b.title)}</div><div class="book-author">${esc(b.author)}</div><div class="book-cat">${esc(b.category)}</div>${priceSection}<div class="card-btns">${readBtn}<button class="c-btn ${saved?'wishlisted':''}" onclick="event.stopPropagation();requireAuthThen(()=>toggleWish('${b.id}'))">${saved?'❤️':'🤍'}</button>${b.isFree?'':`<button class="c-btn buy-btn" onclick="event.stopPropagation();requireAuthThen(()=>addToCart('${b.id}'))">${carted?'✓ Cart':'🛒'}</button>`}</div></div></div>`; }
function renderPills(){ const cats=['All',...CATS.filter(c=>books.some(b=>b.category===c))]; document.getElementById('catPills').innerHTML=cats.map(c=>`<button class="pill${c===activeCat?' on':''}" onclick="setCat('${c}')">${c}</button>`).join(''); }
window.setCat = c => { activeCat=c; filterBooks(); };
function updateStats(){ const total=books.length,free=books.filter(b=>b.isFree).length,cats=new Set(books.map(b=>b.category)).size; document.getElementById('heroStats').innerHTML=`<div class="hero-stat"><strong>${total}</strong><span>Books</span></div><div class="hero-stat"><strong>${free}</strong><span>Free</span></div><div class="hero-stat"><strong>${cats}</strong><span>Categories</span></div>`; }
function updateDots(){ document.getElementById('wishDot').style.display = (currentUser && userWishlist.length) ? 'block':'none'; document.getElementById('cartDot').style.display = (currentUser && userCart.length) ? 'block':'none'; }

// openDetail etc minimal (keep original style)
window.openDetail = function(id){ const b=books.find(x=>x.id===id); if(!b)return; const{cur}=calcPrice(b); const ci=(b.coverColor??b.title.charCodeAt(0))%PALETTES.length; const[c1,c2]=PALETTES[ci]; const covEl = b.cover?`<div class="book-detail-cover"><img src="${esc(b.cover)}"></div>`:`<div class="book-detail-cover-grad" style="background:linear-gradient(135deg,${c1},${c2})">${esc(b.title)}</div>`; const isOwned = currentUser && userPurchased.includes(b.id); const inWish = currentUser && userWishlist.includes(b.id); document.getElementById('detailBody').innerHTML = `${covEl}<div class="book-detail-info"><h2>${esc(b.title)}</h2><div class="book-detail-author">by ${esc(b.author)}</div>${b.description?`<div class="book-detail-desc">${esc(b.description)}</div>`:''}<div class="book-detail-meta"><span class="meta-chip">📂 ${esc(b.category)}</span>${b.publishDate?`<span class="meta-chip">📅 ${b.publishDate.slice(0,4)}</span>`:''}${b.isFree?`<span class="meta-chip">FREE</span>`:`<span class="meta-chip">₹${cur}</span>`}</div><div style="display:flex;gap:10px">${b.pdfUrl && (b.isFree || isOwned)?`<a class="btn btn-forest" href="${esc(b.pdfUrl)}" target="_blank">Read</a>`:''}${!b.isFree && !isOwned?`<button class="btn btn-amber" onclick="requireAuthThen(()=>openBuy('${b.id}'))">Buy</button>`:''}<button class="btn btn-ghost" onclick="requireAuthThen(()=>toggleWish('${b.id}'))">${inWish?'❤️ Saved':'🤍 Wishlist'}</button></div></div>`; document.getElementById('detailModal').style.display='flex'; };
window.closeDetailModal = () => document.getElementById('detailModal').style.display='none';
window.openBuy = function(id){ if(!currentUser) return openAuthModal(); const b=books.find(x=>x.id===id); if(!b||b.isFree) return; const{cur}=calcPrice(b); document.getElementById('buyBody').innerHTML = `<div class="buy-summary"><div><span>${esc(b.title)}</span><span>₹${cur}</span></div><div class="buy-total">Total ₹${cur}</div></div><div class="buy-fields"><div class="fg"><label>Name</label><input id="buyName"></div><div class="fg"><label>Email</label><input id="buyEmail" value="${currentUser.email}"></div></div><button class="btn btn-forest" onclick="launchRazorpay('${b.id}')">Pay ₹${cur}</button>`; document.getElementById('buyModal').style.display='flex'; };
window.launchRazorpay = function(id){ const b=books.find(x=>x.id===id); if(!b)return; const name=document.getElementById('buyName')?.value||''; const email=document.getElementById('buyEmail')?.value||currentUser.email; const{cur}=calcPrice(b); const options={key:RAZORPAY_KEY, amount:cur*100, currency:'INR', name:'Bibek Books', description:b.title, prefill:{name,email}, theme:{color:'#2c5f45'}, handler:async()=>{ await markPurchased([b.id]); closeBuy(); filterBooks(); toast(`✅ "${b.title}" unlocked`); if(b.pdfUrl) window.open(b.pdfUrl,'_blank'); } }; new Razorpay(options).open(); closeBuy(); };
window.closeBuy = () => document.getElementById('buyModal').style.display='none';
window.openCart = async function(){ if(!currentUser) return; const cartBooks = books.filter(b=>userCart.includes(b.id)); const items = document.getElementById('cartItems'); const foot = document.getElementById('cartFoot'); if(!cartBooks.length){ items.innerHTML='<div class="empty"><p>Cart empty</p></div>'; foot.innerHTML=''; } else { const total = cartBooks.reduce((s,b)=>s+calcPrice(b).cur,0); items.innerHTML = cartBooks.map(b=>{const{cur}=calcPrice(b); return `<div class="wish-item"><div><div>${esc(b.title)}</div><div>₹${cur}</div></div><button class="btn btn-ghost btn-sm" onclick="removeFromCart('${b.id}');openCart()">✕</button></div>`;}).join(''); foot.innerHTML=`<div>Total: ₹${total}</div><button class="btn btn-forest" onclick="closeCart();requireAuthThen(()=>{})">Proceed</button>`; } document.getElementById('cartModal').style.display='flex'; };
window.closeCart = () => document.getElementById('cartModal').style.display='none';
window.openWishModal = function(){ if(!currentUser) return; const wBooks = books.filter(b=>userWishlist.includes(b.id)); const container = document.getElementById('wishItems'); if(!wBooks.length) container.innerHTML='<div class="empty"><p>Wishlist empty</p></div>'; else container.innerHTML = wBooks.map(b=>{const{cur}=calcPrice(b); return `<div class="wish-item"><div><div>${esc(b.title)}</div><div>${b.isFree?'FREE':'₹'+cur}</div></div><button class="btn btn-ghost btn-sm" onclick="toggleWish('${b.id}');openWishModal()">✕</button></div>`;}).join(''); document.getElementById('wishModal').style.display='flex'; };
window.closeWishModal = () => document.getElementById('wishModal').style.display='none';

// Author panel (restored full original)
window.toggleAuthorPanel = function(){ const p=document.getElementById('authorPanel'); p.classList.toggle('open'); if(p.classList.contains('open')) renderAuthorPanel(); };
function renderAuthorPanel(){ const head=document.getElementById('authorPanelHead'), body=document.getElementById('authorPanelBody'); if(!isAuthor){ head.innerHTML=''; body.innerHTML=`<div class="login-box"><p>Enter author passcode</p><div class="input-row"><input type="password" id="passInput" placeholder="Passcode"><button class="btn btn-amber" onclick="doLogin()">Login</button></div></div>`; return; } head.innerHTML=`<div><button class="btn btn-ghost btn-sm" onclick="changePass()">Change Password</button><button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button></div>`; body.innerHTML=`<button class="btn btn-amber btn-sm" onclick="toggleAddForm()">➕ Add Book</button><div id="addForm" style="display:none; margin-top:16px"><div class="form-grid"><div class="fg"><label>Title</label><input id="fTitle"></div><div class="fg"><label>Author</label><input id="fAuthor"></div><div class="fg"><label>Date</label><input type="date" id="fDate"></div><div class="fg"><label>Category</label><select id="fCat">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="fg"><label>Price</label><input id="fPrice" value="499"></div><div class="fg"><label>Discount</label><input id="fDisc" value="0"></div></div><div class="check-row"><input type="checkbox" id="fFree"><label>FREE</label></div><div class="fg"><label>Cover</label><input type="file" id="fCover"></div><div class="fg"><label>PDF URL</label><input id="fPdf"></div><div class="fg"><label>Upload PDF</label><input type="file" id="fPdfFile"></div><div class="fg"><label>Description</label><textarea id="fDesc"></textarea></div><button class="btn btn-forest" onclick="publishBook()">Publish</button></div><hr><div class="manage-scroll" id="manageList"></div><hr><div class="fg"><label>Copyright footer</label><textarea id="copyInput" rows="3">${esc(getCopy())}</textarea></div><button class="btn btn-ghost btn-sm" onclick="saveCopyright()">Save</button>`; renderManageList(); }
const getPass = () => localStorage.getItem(SK_PASS) || 'author123';
const setPass = p => localStorage.setItem(SK_PASS,p);
const getCopy = () => localStorage.getItem(SK_COPY) || DEF_COPY;
const saveCopy = t => { localStorage.setItem(SK_COPY,t); document.getElementById('siteFooter').textContent=t; };
window.doLogin = function(){ if(document.getElementById('passInput').value === getPass()){ isAuthor=true; sessionStorage.setItem('bibek_sess','true'); renderAuthorPanel(); toast('Author mode'); } else toast('Wrong pass','err'); };
window.doLogout = function(){ isAuthor=false; sessionStorage.removeItem('bibek_sess'); document.getElementById('authorPanel').classList.remove('open'); filterBooks(); };
window.changePass = function(){ if(prompt('Current')!==getPass()){toast('Wrong','err');return;} const np=prompt('New pass (min 4)'); if(np&&np.length>=4){ setPass(np); toast('Updated'); } };
window.toggleAddForm = () => { const f=document.getElementById('addForm'); if(f) f.style.display = f.style.display==='none'?'block':'none'; };
window.publishBook = async function(){ const title=document.getElementById('fTitle').value.trim(), author=document.getElementById('fAuthor').value.trim(); if(!title||!author) return toast('Title/Author required','err'); try{ const cover=document.getElementById('fCover').files[0] ? await readFile(document.getElementById('fCover').files[0]) : ''; let pdfUrl=document.getElementById('fPdf').value.trim(); const pdfFile=document.getElementById('fPdfFile').files[0]; if(pdfFile) pdfUrl = await uploadPdf(pdfFile); await addDoc(collection(db,'books'), { title, author, publishDate:document.getElementById('fDate').value, category:document.getElementById('fCat').value, price:parseFloat(document.getElementById('fPrice').value)||0, discount:parseFloat(document.getElementById('fDisc').value)||0, isFree:document.getElementById('fFree').checked, pdfUrl, description:document.getElementById('fDesc').value.trim(), cover, coverColor:Math.floor(Math.random()*PALETTES.length), createdAt:Date.now() }); toast('Book published'); document.getElementById('fPdfFile').value=''; } catch(e){ toast('Failed','err'); } };
function renderManageList(){ const c=document.getElementById('manageList'); if(!c)return; c.innerHTML=books.map(b=>`<div class="manage-item"><div>${esc(b.title)}</div><div><button class="btn btn-ghost btn-sm" onclick="openEditModal('${b.id}')">✏️</button><button class="btn btn-ruby btn-sm" onclick="deleteBook('${b.id}')">🗑️</button></div></div>`).join(''); }
window.openEditModal = function(id){ const b=books.find(x=>x.id===id); if(!b)return; document.getElementById('editId').value=b.id; document.getElementById('eTitle').value=b.title; document.getElementById('eAuthor').value=b.author; document.getElementById('eDate').value=b.publishDate||''; document.getElementById('eCat').value=b.category||'Fiction'; document.getElementById('ePrice').value=b.price; document.getElementById('eDisc').value=b.discount||0; document.getElementById('eFree').checked=b.isFree||false; document.getElementById('ePdf').value=b.pdfUrl||''; document.getElementById('eDesc').value=b.description||''; document.getElementById('editModal').style.display='flex'; };
window.confirmEdit = async function(){ const id=document.getElementById('editId').value; const b=books.find(x=>x.id===id); if(!b)return; try{ let pdfUrl=document.getElementById('ePdf').value.trim(); const pdfFile=document.getElementById('ePdfFile').files[0]; if(pdfFile) pdfUrl = await uploadPdf(pdfFile); const cover=document.getElementById('eCover').files[0] ? await readFile(document.getElementById('eCover').files[0]) : b.cover; await updateDoc(doc(db,'books',id), { title:document.getElementById('eTitle').value.trim(), author:document.getElementById('eAuthor').value.trim(), publishDate:document.getElementById('eDate').value, category:document.getElementById('eCat').value, price:parseFloat(document.getElementById('ePrice').value)||0, discount:parseFloat(document.getElementById('eDisc').value)||0, isFree:document.getElementById('eFree').checked, pdfUrl, description:document.getElementById('eDesc').value.trim(), cover }); closeEditModal(); toast('Book updated'); } catch(e){ toast('Update failed','err'); } };
window.deleteBook = async function(id){ if(!confirm('Permanently delete?')) return; await deleteDoc(doc(db,'books',id)); if(currentUser){ userWishlist = userWishlist.filter(x=>x!==id); userCart = userCart.filter(x=>x!==id); await saveUserField(currentUser.uid,'wishlist',userWishlist); await saveUserField(currentUser.uid,'cart',userCart); updateDots(); } toast('Deleted'); };
window.closeEditModal = () => document.getElementById('editModal').style.display='none';
window.saveCopyright = function(){ saveCopy(document.getElementById('copyInput').value); toast('Copyright saved'); };
window.closeReadModal = () => document.getElementById('readModal').style.display='none';

// Firebase books listener
const q = query(collection(db,'books'), orderBy('createdAt','desc'));
onSnapshot(q, (snap) => { books = []; snap.forEach(d=>books.push({id:d.id, discount:0, isFree:false, publishDate:'', pdfUrl:'', description:'', cover:'', coverColor:0, ...d.data()})); if(books.length===0) seedSample(); filterBooks(); updateStats(); renderPills(); renderManageList(); });
async function seedSample(){ const samples = [{title:'The Midnight Library',author:'Matt Haig',category:'Fiction',price:499,discount:20,isFree:false,pdfUrl:'https://www.gutenberg.org/files/1342/1342-h/1342-h.htm',description:'A magical library.',coverColor:0},{title:'Atomic Habits',author:'James Clear',category:'Non-Fiction',price:599,discount:10,isFree:false,pdfUrl:'',description:'Tiny changes.',coverColor:1},{title:'The Alchemist',author:'Paulo Coelho',category:'Spiritual',price:350,isFree:true,pdfUrl:'https://www.gutenberg.org/files/84/84-h/84-h.htm',description:'Journey of self-discovery.',coverColor:2}]; for(let s of samples) await addDoc(collection(db,'books'), {...s, createdAt:Date.now()}); }
isAuthor = sessionStorage.getItem('bibek_sess') === 'true';
document.getElementById('siteFooter').textContent = getCopy();
document.querySelectorAll('.auth-tab').forEach(tab=>tab.addEventListener('click',()=>renderAuthForm(tab.dataset.tab)));
</script>
</body>
</html>

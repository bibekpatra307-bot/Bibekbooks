<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bibek Books | Digital Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1510;
  --ink-2: #4a4035;
  --ink-3: #8a7a6a;
  --paper: #faf7f2;
  --paper-2: #f2ede4;
  --paper-3: #e8e0d4;
  --forest: #2c5f45;
  --forest-l: #3d7d5c;
  --forest-pale: #e8f2ec;
  --amber: #c07c2a;
  --amber-l: #f5e4c8;
  --ruby: #b03030;
  --ruby-l: #fae8e8;
  --card: #ffffff;
  --border: rgba(0,0,0,0.09);
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.18);
  --r: 14px;
  --r-sm: 8px;
  --t: 0.25s cubic-bezier(0.4,0,0.2,1);
  --nav-h: 66px;
}
*{margin:0;padding:0;box-sizing:border-box;}
::selection{background:var(--forest-pale);color:var(--forest);}
body{font-family:'Outfit',sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh;}
.nav{position:sticky;top:0;z-index:200;height:var(--nav-h);background:rgba(250,247,242,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;width:100%;}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;color:var(--forest);display:flex;align-items:center;gap:10px;text-decoration:none;white-space:nowrap;}
.nav-logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--forest),var(--amber));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;box-shadow:0 3px 10px rgba(44,95,69,0.35);}
.nav-search{flex:1;max-width:480px;position:relative;margin:0 auto;}
.nav-search input{width:100%;padding:10px 18px 10px 46px;border:1.5px solid var(--border);border-radius:50px;font-size:0.9rem;font-family:inherit;background:var(--card);outline:none;transition:var(--t);}
.nav-search input:focus{border-color:var(--forest);box-shadow:0 0 0 4px var(--forest-pale);}
.nav-search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none;}
.nav-btns{display:flex;gap:6px;align-items:center;}
.nav-btn{height:40px;border-radius:50px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:var(--t);font-family:inherit;font-weight:500;font-size:0.82rem;padding:0 14px;background:transparent;color:var(--ink-2);position:relative;}
.nav-btn:hover{background:var(--paper-3);color:var(--ink);}
.nav-btn.author-active{background:var(--amber-l);color:var(--amber);}
.nav-btn-icon{width:40px;padding:0;}
.user-btn{background:var(--forest-pale);color:var(--forest);font-weight:600;min-width:100px;}
.wish-dot{position:absolute;top:6px;right:6px;width:9px;height:9px;border-radius:50%;background:var(--ruby);border:2px solid var(--paper);display:none;}
.hero{text-align:center;padding:52px 24px 36px;position:relative;}
.hero-badge{display:inline-flex;gap:6px;background:var(--forest-pale);color:var(--forest);padding:5px 14px;border-radius:50px;font-size:0.78rem;font-weight:600;margin-bottom:18px;border:1px solid rgba(44,95,69,0.2);}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5vw,3.6rem);font-weight:700;letter-spacing:-0.8px;margin-bottom:12px;}
.hero h1 em{color:var(--forest);font-style:italic;}
.hero p{color:var(--ink-3);max-width:460px;margin:0 auto 28px;}
.hero-stats{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;}
.hero-stat strong{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--forest);display:block;}
.hero-stat span{font-size:0.78rem;color:var(--ink-3);}
.main{max-width:1280px;margin:0 auto;padding:0 16px 80px;}
.author-panel{background:var(--card);border:1.5px solid var(--amber-l);border-radius:var(--r);padding:28px;margin-bottom:32px;display:none;box-shadow:var(--shadow-sm);}
.author-panel.open{display:block;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--amber);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-weight:600;font-size:0.78rem;color:var(--ink-3);text-transform:uppercase;}
.fg input,.fg textarea,.fg select{padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:inherit;font-size:0.88rem;background:#fff;outline:none;}
.fg input:focus,.fg textarea:focus{border-color:var(--forest);box-shadow:0 0 0 3px var(--forest-pale);}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:#fff;margin-bottom:12px;}
.section-bar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;}
.pill{padding:6px 18px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:0.82rem;font-family:inherit;transition:var(--t);color:var(--ink-3);}
.pill.on{background:var(--forest);color:#fff;border-color:var(--forest);}
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(200px,45%),1fr));gap:16px;}
.book-card{background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);transition:var(--t);cursor:pointer;display:flex;flex-direction:column;box-shadow:var(--shadow-xs);}
.book-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);}
.book-cover{width:100%;aspect-ratio:2/2.9;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:#fff;text-align:center;padding:20px;position:relative;overflow:hidden;}
.book-cover img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.cover-text{position:relative;z-index:1;text-shadow:0 2px 10px rgba(0,0,0,0.4);}
.book-badge{position:absolute;top:10px;left:10px;z-index:2;padding:3px 10px;border-radius:50px;font-size:0.65rem;font-weight:700;}
.badge-free{background:var(--forest);color:#fff;}
.badge-disc{background:var(--ruby);color:#fff;}
.badge-read{position:absolute;top:10px;right:10px;z-index:2;background:rgba(0,0,0,0.6);color:#fff;padding:3px 10px;border-radius:50px;font-size:0.65rem;opacity:0;transition:var(--t);}
.book-card:hover .badge-read{opacity:1;}
.book-info{padding:14px;flex:1;}
.book-title{font-weight:600;font-size:0.92rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.book-author{font-size:0.76rem;color:var(--ink-3);margin-top:2px;}
.price-row{display:flex;align-items:center;gap:7px;margin-top:6px;}
.price-now{font-weight:800;font-size:1rem;color:var(--forest);}
.price-was{font-size:0.73rem;text-decoration:line-through;color:#aaa;}
.card-btns{display:flex;gap:7px;margin-top:10px;}
.c-btn{flex:1;border:1px solid var(--border);padding:7px 8px;border-radius:50px;font-size:0.74rem;font-weight:500;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;background:var(--paper);font-family:inherit;text-decoration:none;color:var(--ink);}
.c-btn.wishlisted{color:var(--ruby);border-color:var(--ruby-l);background:var(--ruby-l);}
.c-btn.buy-btn{background:var(--forest);color:#fff;border-color:var(--forest);}
.btn{padding:9px 22px;border-radius:50px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:0.85rem;display:inline-flex;align-items:center;gap:7px;text-decoration:none;}
.btn-forest{background:var(--forest);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-ghost{background:var(--paper-2);color:var(--ink-2);}
.btn-ruby{background:var(--ruby);color:#fff;}
.btn-sm{padding:6px 14px;font-size:0.78rem;}
.overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:#fff;border-radius:var(--r);width:100%;max-width:900px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.card-modal{background:#fff;border-radius:20px;max-width:540px;width:90%;max-height:86vh;overflow-y:auto;padding:28px;}
.book-detail{display:flex;gap:24px;padding:24px;flex-wrap:wrap;}
.book-detail-cover{width:140px;height:200px;border-radius:10px;overflow:hidden;flex-shrink:0;}
.book-detail-cover img{width:100%;height:100%;object-fit:cover;}
.book-detail-cover-grad{width:140px;height:200px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;color:#fff;text-align:center;padding:16px;background:linear-gradient(135deg,var(--forest),var(--amber));}
.buy-summary{background:var(--paper-2);border-radius:var(--r-sm);padding:18px;margin-bottom:20px;}
.buy-total{display:flex;justify-content:space-between;font-weight:700;padding-top:10px;border-top:1px solid var(--border);margin-top:10px;color:var(--forest);}
.toast-wrap{position:fixed;bottom:24px;left:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{padding:11px 20px;border-radius:50px;color:#fff;font-weight:500;animation:slideInL 0.3s ease,fadeOut 0.3s ease 2.7s forwards;box-shadow:var(--shadow-md);}
.toast.ok{background:#2d7a52;}
.toast.err{background:#b03030;}
.site-footer{background:var(--paper-3);border-top:1px solid var(--border);padding:30px 24px;text-align:center;font-size:0.74rem;color:var(--ink-3);white-space:pre-line;margin-top:60px;}
.auth-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
.auth-card{background:white;border-radius:28px;max-width:420px;width:90%;padding:32px 28px;text-align:center;}
.auth-tabs{display:flex;gap:12px;margin-bottom:24px;border-bottom:2px solid var(--border);}
.auth-tab{flex:1;background:none;border:none;font-weight:600;font-size:1rem;cursor:pointer;color:var(--ink-3);padding-bottom:8px;}
.auth-tab.active{color:var(--forest);border-bottom:2px solid var(--forest);}
@keyframes slideInL{from{transform:translateX(-120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateY(6px)}}
@media(max-width:768px){.book-grid{grid-template-columns:repeat(2,1fr);gap:12px;}.form-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="toast-wrap" id="toastWrap"></div>
<nav class="nav">
  <a class="nav-logo" href="#"><div class="nav-logo-mark">📚</div>Bibek Books</a>
  <div class="nav-search"><span class="nav-search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search titles, authors…" oninput="filterBooks()"></div>
  <div class="nav-btns">
    <button class="nav-btn nav-btn-icon" title="Cart" onclick="requireAuthThen(()=>openCart())">🛒<span class="wish-dot" id="cartDot"></span></button>
    <button class="nav-btn nav-btn-icon" title="Wishlist" onclick="requireAuthThen(()=>openWishlist())">❤️<span class="wish-dot" id="wishDot"></span></button>
    <button class="nav-btn user-btn" id="userStatusBtn" onclick="openAuthModal()">👤 Account</button>
    <button class="nav-btn nav-btn-icon" id="authorBtn" onclick="toggleAuthorPanel()">✍️</button>
  </div>
</nav>
<div class="hero"><div class="hero-badge">✨ Discover · Read · Collect</div><h1>Your Personal<br><em>Digital Library</em></h1><p>Curated books by Bibek — buy, read free titles, and save your favourites.</p><div class="hero-stats" id="heroStats"></div></div>
<div class="main">
  <div class="author-panel" id="authorPanel"><div class="panel-header"><div class="panel-title">✍️ Author Studio</div><div id="authorPanelHead"></div></div><div id="authorPanelBody"></div></div>
  <div class="section-bar"><div class="section-title" id="sectionTitle">All Books</div><div class="cat-pills" id="catPills"></div></div>
  <div class="book-grid" id="bookGrid"></div>
</div>
<footer class="site-footer" id="siteFooter"></footer>

<!-- MODALS -->
<div class="overlay" id="detailModal" style="display:none" onclick="if(event.target===this)closeDetailModal()"><div class="modal-box" style="max-width:660px"><div class="modal-head" style="padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between"><h3 id="detailTitle">Book Details</h3><button class="modal-close" onclick="closeDetailModal()" style="background:var(--paper-2);border:none;width:36px;border-radius:50%;cursor:pointer;">✕</button></div><div id="detailBody" class="book-detail"></div><div class="modal-foot" id="detailFoot" style="padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;"></div></div></div>
<div class="overlay" id="wishModal" style="display:none" onclick="if(event.target===this)closeWishModal()"><div class="card-modal"><h3 style="display:flex;justify-content:space-between">❤️ Wishlist <button onclick="closeWishModal()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">✕</button></h3><div id="wishItems"></div></div></div>
<div class="overlay" id="cartModal" style="display:none" onclick="if(event.target===this)closeCart()"><div class="card-modal"><h3 style="display:flex;justify-content:space-between">🛒 Cart <button onclick="closeCart()" style="background:none;border:none;font-size:1.4rem;cursor:pointer;">✕</button></h3><div id="cartItems"></div><div id="cartFoot" style="margin-top:14px"></div></div></div>
<div class="overlay" id="buyModal" style="display:none" onclick="if(event.target===this)closeBuy()"><div class="card-modal" style="max-width:420px"><h3 style="display:flex;justify-content:space-between">💳 Checkout <button onclick="closeBuy()" style="background:none;border:none;font-size:1.4rem;">✕</button></h3><div id="buyBody"></div></div></div>
<div class="overlay" id="editModal" style="display:none" onclick="if(event.target===this)closeEditModal()"><div class="card-modal"><h3>✏️ Edit Book <button onclick="closeEditModal()" style="float:right;">✕</button></h3><input type="hidden" id="editId"><div class="form-grid"><div class="fg"><label>Title</label><input id="eTitle"></div><div class="fg"><label>Author</label><input id="eAuthor"></div><div class="fg"><label>Publish Date</label><input type="date" id="eDate"></div><div class="fg"><label>Category</label><select id="eCat"><option>Fiction</option><option>Non-Fiction</option><option>Spiritual</option><option>Science</option><option>History</option><option>Poetry</option><option>Business</option></select></div><div class="fg"><label>Price</label><input id="ePrice" type="number"></div><div class="fg"><label>Discount</label><input id="eDisc" type="number" min="0" max="90"></div></div><div class="check-row"><input type="checkbox" id="eFree"><label>📖 FREE book</label></div><div class="fg"><label>Cover Image</label><input type="file" id="eCover" accept="image/*"></div><div class="fg"><label>PDF URL</label><input id="ePdf" placeholder="https://..."></div><div class="fg"><label>Upload PDF (optional)</label><input type="file" id="ePdfFile" accept="application/pdf"></div><div class="fg"><label>Description</label><textarea id="eDesc" rows="3"></textarea></div><button class="btn btn-forest" onclick="confirmEdit()">💾 Save</button><button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button></div></div></div>
<div id="authModal" style="display:none" class="auth-overlay" onclick="if(event.target===this) closeAuthModal()"><div class="auth-card"><div class="auth-tabs"><button class="auth-tab active" data-tab="login">Login</button><button class="auth-tab" data-tab="register">Create Account</button></div><div id="authFormContainer"></div><div class="auth-foot" id="authFootMsg"></div></div></div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, getDoc, setDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = { apiKey: "AIzaSyC9vp6iqR0O2KOKguHBKs6ZWCWXN1oEzAs", authDomain: "bibek-media-143ba.firebaseapp.com", projectId: "bibek-media-143ba", storageBucket: "bibek-media-143ba.firebasestorage.app", messagingSenderId: "135854036939", appId: "1:135854036939:web:35d2b18c16c6037ef7484e" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);
const auth = getAuth(app);

let books = [], currentUser = null, userWishlist = [], userCart = [], userPurchased = [], isAuthor = false, activeCat = 'All';
const CATS = ['Spiritual','Fiction','Non-Fiction','Science','History','Poetry','Business'];
const PALETTES = [['#2c5f45','#4a9e72'],['#7a3b1e','#c47a4a'],['#1a4a7a','#4a90c8'],['#5a2d7a','#9a55c8'],['#a82020','#d86060'],['#1e6070','#3ab0c8']];
const RAZORPAY_KEY = 'rzp_test_YourKeyHere';
const SK_PASS = 'bibek_pass', DEF_PASS = 'author123';
const getPass = () => localStorage.getItem(SK_PASS) || DEF_PASS;
const setPass = p => localStorage.setItem(SK_PASS, p);
const getCopy = () => localStorage.getItem('bibek_copy') || `Copyright © 2026 by Bibek Patra\nBibek Books · Digital Bookstore`;
const saveCopy = t => { localStorage.setItem('bibek_copy', t); document.getElementById('siteFooter').textContent = t; };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const toast = (msg,type='ok')=>{ const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; document.getElementById('toastWrap').appendChild(t); setTimeout(()=>t.remove(),3300); };
const calcPrice = (b) => { if(b.isFree) return {cur:0, orig:b.price, disc:0}; const d=Math.max(0,Math.min(90,b.discount||0)); return {cur: d>0?Math.round(b.price*(1-d/100)):b.price, orig:b.price, disc:d}; };
const readFileAsDataURL = (file) => new Promise((res,rej)=>{ if(!file){res('');return;} const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>{ const MAX=600; let w=img.width,h=img.height; if(w>MAX||h>MAX) w>h? (h=Math.round(h*MAX/w),w=MAX) : (w=Math.round(w*MAX/h),h=MAX); const canvas=document.createElement('canvas'); canvas.width=w;canvas.height=h; canvas.getContext('2d').drawImage(img,0,0,w,h); res(canvas.toDataURL('image/jpeg',0.75)); }; img.onerror=rej; img.src=r.result; }; r.readAsDataURL(file); });
const uploadPdf = async (file) => { if(!file) return ''; const safeName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`; const storageRef = ref(storage, `books/pdfs/${safeName}`); await uploadBytes(storageRef, file); return await getDownloadURL(storageRef); };

async function loadUserData(uid) { if(!uid) return; const refDoc = doc(db, 'userData', uid); const snap = await getDoc(refDoc); if(snap.exists()){ const d=snap.data(); userWishlist=d.wishlist||[]; userCart=d.cart||[]; userPurchased=d.purchased||[]; } else { userWishlist=[]; userCart=[]; userPurchased=[]; await setDoc(refDoc, {wishlist:[], cart:[], purchased:[]}); } updateDots(); filterBooks(); }
async function saveUserField(uid, field, val) { if(!uid) return; await setDoc(doc(db,'userData',uid), {[field]: val}, {merge:true}); }
async function markPurchased(ids) { if(!currentUser) return; const newArr = [...new Set([...userPurchased, ...ids])]; userPurchased = newArr; await saveUserField(currentUser.uid,'purchased',userPurchased); userCart = userCart.filter(x=>!ids.includes(x)); await saveUserField(currentUser.uid,'cart',userCart); updateDots(); filterBooks(); }

window.toggleWish = async (id) => { if(!currentUser) return openAuthModal(); if(userWishlist.includes(id)){ userWishlist = userWishlist.filter(x=>x!==id); await saveUserField(currentUser.uid,'wishlist',userWishlist); toast('Removed from wishlist','inf'); } else { userWishlist.push(id); await saveUserField(currentUser.uid,'wishlist',userWishlist); toast('❤️ Added to wishlist'); } updateDots(); filterBooks(); };
window.addToCart = async (id) => { if(!currentUser) return openAuthModal(); const b=books.find(x=>x.id===id); if(!b||b.isFree) return; if(!userCart.includes(id)){ userCart.push(id); await saveUserField(currentUser.uid,'cart',userCart); toast('🛒 Added to cart'); } updateDots(); filterBooks(); };
window.removeFromCart = async (id) => { if(!currentUser) return; userCart = userCart.filter(x=>x!==id); await saveUserField(currentUser.uid,'cart',userCart); updateDots(); filterBooks(); openCart(); };

window.requireAuthThen = (cb) => { if(currentUser) cb(); else openAuthModal(); };

// Auth UI
window.openAuthModal = () => { document.getElementById('authModal').style.display='flex'; renderAuthForm('login'); };
window.closeAuthModal = () => document.getElementById('authModal').style.display='none';
function renderAuthForm(tab){ const container = document.getElementById('authFormContainer'); document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active')); if(tab==='login'){ document.querySelector('.auth-tab[data-tab="login"]').classList.add('active'); container.innerHTML = `<div class="auth-form"><div class="fg"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com"></div><div class="fg"><label>Password</label><input type="password" id="authPassword" placeholder="••••••"></div><button class="btn btn-forest auth-btn" style="width:100%;justify-content:center" id="doLoginBtn">Login</button><div class="auth-foot" style="margin-top:12px"><button id="forgotBtn" style="background:none;border:none;color:var(--forest);cursor:pointer;">Forgot password?</button></div></div>`; document.getElementById('doLoginBtn')?.addEventListener('click', handleLogin); document.getElementById('forgotBtn')?.addEventListener('click', handleForgot); } else { document.querySelector('.auth-tab[data-tab="register"]').classList.add('active'); container.innerHTML = `<div class="auth-form"><div class="fg"><label>Email</label><input type="email" id="regEmail"></div><div class="fg"><label>Password (min 6)</label><input type="password" id="regPassword"></div><button class="btn btn-forest auth-btn" style="width:100%" id="doRegisterBtn">Create Account</button></div>`; document.getElementById('doRegisterBtn')?.addEventListener('click', handleRegister); } }
async function handleLogin(){ const email=document.getElementById('authEmail')?.value.trim(), pwd=document.getElementById('authPassword')?.value; if(!email||!pwd) return toast('Fill all fields','err'); try{ await signInWithEmailAndPassword(auth, email, pwd); closeAuthModal(); toast(`Welcome ${email.split('@')[0]}!`); } catch(e){ toast(e.message,'err'); } }
async function handleRegister(){ const email=document.getElementById('regEmail')?.value.trim(), pwd=document.getElementById('regPassword')?.value; if(pwd?.length<6) return toast('Password min 6 chars','err'); try{ await createUserWithEmailAndPassword(auth, email, pwd); closeAuthModal(); toast('Account created!'); } catch(e){ toast(e.message,'err'); } }
async function handleForgot(){ const email=prompt('Enter email for reset:'); if(email) try{ await sendPasswordResetEmail(auth, email); toast('Reset email sent','inf'); } catch(e){ toast(e.message,'err'); } }
onAuthStateChanged(auth, async (user) => { currentUser = user; const btn = document.getElementById('userStatusBtn'); if(user){ btn.innerHTML = `👤 ${user.email.split('@')[0]}`; btn.onclick = () => signOut(auth); await loadUserData(user.uid); } else { btn.innerHTML = `👤 Account`; btn.onclick = () => openAuthModal(); userWishlist=[]; userCart=[]; userPurchased=[]; updateDots(); filterBooks(); } });

// Book rendering
function renderBooks(list){ const grid=document.getElementById('bookGrid'); if(!list.length){ grid.innerHTML=`<div class="empty" style="text-align:center;padding:60px"><div>📭</div><p>No books found</p></div>`; return; } grid.innerHTML = list.map(b=>bookCard(b)).join(''); }
function bookCard(b){ const{cur,disc}=calcPrice(b); const saved = currentUser && userWishlist.includes(b.id); const carted = currentUser && userCart.includes(b.id); const ci=(b.coverColor??b.title.charCodeAt(0))%PALETTES.length; const[c1,c2]=PALETTES[ci]; const coverHtml = b.cover?`<img src="${esc(b.cover)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0">`:`<span class="cover-text">${esc(b.title)}</span>`; const topBadge = b.isFree?`<span class="book-badge badge-free">FREE</span>`:(disc>0?`<span class="book-badge badge-disc">${disc}% OFF</span>`:''); const readBadge = b.pdfUrl?`<span class="badge-read">📖 READ</span>`:''; const priceSection = b.isFree?`<div class="price-row"><span style="color:var(--forest)">📖 Free</span></div>`:`<div class="price-row"><span class="price-now">₹${cur}</span>${disc>0?`<span class="price-was">₹${b.price}</span>`:''}</div>`; const canRead = (b.isFree || (currentUser && userPurchased.includes(b.id))) && b.pdfUrl; const readBtn = canRead ? `<a class="c-btn" href="${esc(b.pdfUrl)}" target="_blank" onclick="event.stopPropagation()">📖 Read</a>` : `<button class="c-btn" onclick="event.stopPropagation();requireAuthThen(()=>openBuy('${b.id}'))">🔒 Buy</button>`; return `<div class="book-card" onclick="openDetail('${b.id}')"><div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})">${coverHtml}${topBadge}${readBadge}</div><div class="book-info"><div class="book-title">${esc(b.title)}</div><div class="book-author">${esc(b.author)}</div><div class="book-cat" style="font-size:0.7rem;color:#aaa">${esc(b.category)}</div>${priceSection}<div class="card-btns">${readBtn}<button class="c-btn ${saved?'wishlisted':''}" onclick="event.stopPropagation();requireAuthThen(()=>toggleWish('${b.id}'))">${saved?'❤️':'🤍'}</button>${b.isFree?'':`<button class="c-btn buy-btn" onclick="event.stopPropagation();requireAuthThen(()=>addToCart('${b.id}'))">${carted?'✓ Cart':'🛒'}</button>`}</div></div></div>`; }
function filterBooks(){ const q=document.getElementById('searchInput').value.toLowerCase(); let list=activeCat==='All'?books:books.filter(b=>b.category===activeCat); if(q) list=list.filter(b=>b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)); document.getElementById('sectionTitle').textContent=q?`Results for "${q}"`:activeCat==='All'?'All Books':activeCat; renderPills(); renderBooks(list); updateStats(); }
function renderPills(){ const cats=['All',...CATS.filter(c=>books.some(b=>b.category===c))]; document.getElementById('catPills').innerHTML=cats.map(c=>`<button class="pill${c===activeCat?' on':''}" onclick="setCat('${c}')">${c}</button>`).join(''); }
window.setCat = c => { activeCat=c; filterBooks(); };
function updateStats(){ const total=books.length,free=books.filter(b=>b.isFree).length,cats=new Set(books.map(b=>b.category)).size; document.getElementById('heroStats').innerHTML=`<div class="hero-stat"><strong>${total}</strong><span>Books</span></div><div class="hero-stat"><strong>${free}</strong><span>Free</span></div><div class="hero-stat"><strong>${cats}</strong><span>Categories</span></div>`; }
function updateDots(){ document.getElementById('wishDot').style.display = (currentUser && userWishlist.length) ? 'block':'none'; document.getElementById('cartDot').style.display = (currentUser && userCart.length) ? 'block':'none'; }

window.openDetail = function(id){ const b=books.find(x=>x.id===id); if(!b)return; const{cur}=calcPrice(b); const ci=(b.coverColor??b.title.charCodeAt(0))%PALETTES.length; const[c1,c2]=PALETTES[ci]; const covEl = b.cover?`<div class="book-detail-cover"><img src="${esc(b.cover)}"></div>`:`<div class="book-detail-cover-grad" style="background:linear-gradient(135deg,${c1},${c2})">${esc(b.title)}</div>`; const isOwned = currentUser && userPurchased.includes(b.id); const inWish = currentUser && userWishlist.includes(b.id); document.getElementById('detailBody').innerHTML = `${covEl}<div class="book-detail-info"><h2>${esc(b.title)}</h2><div class="book-detail-author">by ${esc(b.author)}</div>${b.description?`<div class="book-detail-desc">${esc(b.description)}</div>`:''}<div class="book-detail-meta" style="display:flex;gap:8px;flex-wrap:wrap;margin:10px 0"><span class="meta-chip" style="padding:4px 12px;background:var(--paper-2);border-radius:50px">📂 ${esc(b.category)}</span>${b.publishDate?`<span class="meta-chip">📅 ${b.publishDate.slice(0,4)}</span>`:''}${b.isFree?`<span class="meta-chip">FREE</span>`:`<span class="meta-chip">₹${cur}</span>`}</div><div style="display:flex;gap:10px;flex-wrap:wrap">${b.pdfUrl && (b.isFree || isOwned)?`<a class="btn btn-forest" href="${esc(b.pdfUrl)}" target="_blank">📖 Read Now</a>`:''}${!b.isFree && !isOwned?`<button class="btn btn-amber" onclick="requireAuthThen(()=>openBuy('${b.id}'))">💳 Buy ₹${cur}</button>`:''}<button class="btn btn-ghost" onclick="requireAuthThen(()=>toggleWish('${b.id}'))">${inWish?'❤️ Saved':'🤍 Wishlist'}</button></div></div>`; document.getElementById('detailModal').style.display='flex'; };
window.closeDetailModal = () => document.getElementById('detailModal').style.display='none';

window.openBuy = function(id){ if(!currentUser) return openAuthModal(); const b=books.find(x=>x.id===id); if(!b||b.isFree) return; const{cur}=calcPrice(b); document.getElementById('buyBody').innerHTML = `<div class="buy-summary"><div style="display:flex;justify-content:space-between"><span>${esc(b.title)}</span><span>₹${cur}</span></div><div class="buy-total">Total ₹${cur}</div></div><div class="buy-fields"><div class="fg"><label>Name</label><input id="buyName" placeholder="Your name"></div><div class="fg"><label>Email</label><input id="buyEmail" value="${currentUser.email}"></div></div><button class="btn btn-forest" style="width:100%" onclick="launchRazorpay('${b.id}')">Pay ₹${cur}</button>`; document.getElementById('buyModal').style.display='flex'; };
window.launchRazorpay = function(id){ const b=books.find(x=>x.id===id); if(!b)return; const name=document.getElementById('buyName')?.value||''; const email=document.getElementById('buyEmail')?.value||currentUser.email; const{cur}=calcPrice(b); const options={key:RAZORPAY_KEY, amount:cur*100, currency:'INR', name:'Bibek Books', description:b.title, prefill:{name,email}, theme:{color:'#2c5f45'}, handler:async()=>{ await markPurchased([b.id]); closeBuy(); filterBooks(); toast(`✅ "${b.title}" unlocked`); if(b.pdfUrl) window.open(b.pdfUrl,'_blank'); } }; new Razorpay(options).open(); closeBuy(); };
window.closeBuy = () => document.getElementById('buyModal').style.display='none';
window.openCart = async function(){ if(!currentUser) return; const cartBooks = books.filter(b=>userCart.includes(b.id)); const itemsDiv=document.getElementById('cartItems'), footDiv=document.getElementById('cartFoot'); if(!cartBooks.length){ itemsDiv.innerHTML='<div style="text-align:center;padding:40px">🛒 Cart empty</div>'; footDiv.innerHTML=''; } else { const total = cartBooks.reduce((s,b)=>s+calcPrice(b).cur,0); itemsDiv.innerHTML = cartBooks.map(b=>{const{cur}=calcPrice(b); return `<div class="wish-item" style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><div><strong>${esc(b.title)}</strong><br>₹${cur}</div><button class="btn btn-ghost btn-sm" onclick="removeFromCart('${b.id}');openCart()">✕</button></div>`;}).join(''); footDiv.innerHTML=`<div style="display:flex;justify-content:space-between;font-weight:700;margin:12px 0">Total: ₹${total}</div><button class="btn btn-forest" style="width:100%" onclick="closeCart();openCartCheckout()">Proceed to Checkout</button>`; } document.getElementById('cartModal').style.display='flex'; };
window.openCartCheckout = function(){ if(!currentUser) return; const cartBooks = books.filter(b=>userCart.includes(b.id)); if(!cartBooks.length) return; const total = cartBooks.reduce((s,b)=>s+calcPrice(b).cur,0); document.getElementById('buyBody').innerHTML = `<div class="buy-summary">${cartBooks.map(b=>`<div>${esc(b.title)} ₹${calcPrice(b).cur}</div>`).join('')}<div class="buy-total">Total ₹${total}</div></div><div class="buy-fields"><div class="fg"><label>Name</label><input id="buyNameCart"></div><div class="fg"><label>Email</label><input id="buyEmailCart" value="${currentUser.email}"></div></div><button class="btn btn-forest" style="width:100%" onclick="launchCartRazorpay()">Pay ₹${total}</button>`; document.getElementById('buyModal').style.display='flex'; };
window.launchCartRazorpay = function(){ const cartBooks = books.filter(b=>userCart.includes(b.id)); const name=document.getElementById('buyNameCart')?.value||''; const email=document.getElementById('buyEmailCart')?.value||currentUser.email; const total = cartBooks.reduce((s,b)=>s+calcPrice(b).cur,0); const options={key:RAZORPAY_KEY, amount:total*100, currency:'INR', name:'Bibek Books', description:`${cartBooks.length} books`, prefill:{name,email}, theme:{color:'#2c5f45'}, handler:async()=>{ const ids = cartBooks.map(b=>b.id); await markPurchased(ids); closeBuy(); filterBooks(); toast(`✅ ${ids.length} books unlocked`); } }; new Razorpay(options).open(); closeBuy(); };
window.closeCart = () => document.getElementById('cartModal').style.display='none';
window.openWishlist = function(){ if(!currentUser) return; const wBooks = books.filter(b=>userWishlist.includes(b.id)); const container = document.getElementById('wishItems'); if(!wBooks.length) container.innerHTML='<div style="text-align:center;padding:40px">❤️ Wishlist empty</div>'; else container.innerHTML = wBooks.map(b=>`<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)"><div><strong>${esc(b.title)}</strong><br>${b.isFree?'FREE':'₹'+calcPrice(b).cur}</div><button class="btn btn-ghost btn-sm" onclick="toggleWish('${b.id}');openWishlist()">✕</button></div>`).join(''); document.getElementById('wishModal').style.display='flex'; };
window.closeWishModal = () => document.getElementById('wishModal').style.display='none';

// AUTHOR PANEL (full)
window.toggleAuthorPanel = function(){ const p=document.getElementById('authorPanel'); p.classList.toggle('open'); if(p.classList.contains('open')) renderAuthorPanel(); };
function renderAuthorPanel(){ const head=document.getElementById('authorPanelHead'), body=document.getElementById('authorPanelBody'); if(!isAuthor){ head.innerHTML=''; body.innerHTML=`<div class="login-box"><p>Author passcode</p><div class="input-row"><input type="password" id="passInput" placeholder="Passcode"><button class="btn btn-amber" onclick="doLogin()">Login</button></div></div>`; return; } head.innerHTML=`<div><button class="btn btn-ghost btn-sm" onclick="changePass()">Change Password</button><button class="btn btn-ghost btn-sm" onclick="doLogout()">Logout</button></div>`; body.innerHTML=`<button class="btn btn-amber btn-sm" onclick="toggleAddForm()">➕ Add Book</button><div id="addForm" style="display:none; margin-top:16px"><div class="form-grid"><div class="fg"><label>Title</label><input id="fTitle"></div><div class="fg"><label>Author</label><input id="fAuthor"></div><div class="fg"><label>Date</label><input type="date" id="fDate"></div><div class="fg"><label>Category</label><select id="fCat">${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="fg"><label>Price</label><input id="fPrice" value="499"></div><div class="fg"><label>Discount</label><input id="fDisc" value="0"></div></div><div class="check-row"><input type="checkbox" id="fFree"><label>FREE</label></div><div class="fg"><label>Cover</label><input type="file" id="fCover" accept="image/*"></div><div class="fg"><label>PDF URL</label><input id="fPdf"></div><div class="fg"><label>Upload PDF</label><input type="file" id="fPdfFile" accept="application/pdf"></div><div class="fg"><label>Description</label><textarea id="fDesc"></textarea></div><button class="btn btn-forest" onclick="publishBook()">Publish</button></div><hr><div class="manage-scroll" id="manageList" style="max-height:260px;overflow-y:auto"></div><hr><div class="fg"><label>Copyright footer</label><textarea id="copyInput" rows="3">${esc(getCopy())}</textarea></div><button class="btn btn-ghost btn-sm" onclick="saveCopyright()">Save Copyright</button>`; renderManageList(); }
window.doLogin = function(){ if(document.getElementById('passInput').value === getPass()){ isAuthor=true; sessionStorage.setItem('bibek_sess','true'); renderAuthorPanel(); toast('Author mode'); filterBooks(); } else toast('Wrong pass','err'); };
window.doLogout = function(){ isAuthor=false; sessionStorage.removeItem('bibek_sess'); document.getElementById('authorPanel').classList.remove('open'); filterBooks(); };
window.changePass = function(){ if(prompt('Current password')!==getPass()){toast('Wrong','err');return;} const np=prompt('New password (min 4)'); if(np?.length>=4){ setPass(np); toast('Password updated'); } };
window.toggleAddForm = () => { const f=document.getElementById('addForm'); if(f) f.style.display = f.style.display==='none'?'block':'none'; };
window.publishBook = async function(){ const title=document.getElementById('fTitle').value.trim(), author=document.getElementById('fAuthor').value.trim(); if(!title||!author) return toast('Title/Author required','err'); try{ const cover=document.getElementById('fCover').files[0] ? await readFileAsDataURL(document.getElementById('fCover').files[0]) : ''; let pdfUrl=document.getElementById('fPdf').value.trim(); const pdfFile=document.getElementById('fPdfFile').files[0]; if(pdfFile){ toast('Uploading PDF...','inf'); pdfUrl = await uploadPdf(pdfFile); } await addDoc(collection(db,'books'), { title, author, publishDate:document.getElementById('fDate').value, category:document.getElementById('fCat').value, price:parseFloat(document.getElementById('fPrice').value)||0, discount:parseFloat(document.getElementById('fDisc').value)||0, isFree:document.getElementById('fFree').checked, pdfUrl, description:document.getElementById('fDesc').value.trim(), cover, coverColor:Math.floor(Math.random()*PALETTES.length), createdAt:Date.now() }); toast('✅ Book published!'); document.getElementById('fPdfFile').value=''; document.getElementById('addForm').style.display='none'; } catch(e){ toast('Publish failed','err'); } };
function renderManageList(){ const c=document.getElementById('manageList'); if(c) c.innerHTML=books.map(b=>`<div class="manage-item" style="display:flex;justify-content:space-between;padding:8px 0"><span>${esc(b.title)}</span><div><button class="btn btn-ghost btn-sm" onclick="openEditModal('${b.id}')">✏️</button><button class="btn btn-ruby btn-sm" onclick="deleteBook('${b.id}')">🗑️</button></div></div>`).join(''); }
window.openEditModal = function(id){ const b=books.find(x=>x.id===id); if(!b)return; document.getElementById('editId').value=b.id; document.getElementById('eTitle').value=b.title; document.getElementById('eAuthor').value=b.author; document.getElementById('eDate').value=b.publishDate||''; document.getElementById('eCat').value=b.category||'Fiction'; document.getElementById('ePrice').value=b.price; document.getElementById('eDisc').value=b.discount||0; document.getElementById('eFree').checked=b.isFree||false; document.getElementById('ePdf').value=b.pdfUrl||''; document.getElementById('eDesc').value=b.description||''; document.getElementById('editModal').style.display='flex'; };
window.confirmEdit = async function(){ const id=document.getElementById('editId').value; const b=books.find(x=>x.id===id); if(!b)return; try{ let pdfUrl=document.getElementById('ePdf').value.trim(); const pdfFile=document.getElementById('ePdfFile').files[0]; if(pdfFile){ toast('Uploading PDF...','inf'); pdfUrl = await uploadPdf(pdfFile); } const cover=document.getElementById('eCover').files[0] ? await readFileAsDataURL(document.getElementById('eCover').files[0]) : b.cover; await updateDoc(doc(db,'books',id), { title:document.getElementById('eTitle').value.trim(), author:document.getElementById('eAuthor').value.trim(), publishDate:document.getElementById('eDate').value, category:document.getElementById('eCat').value, price:parseFloat(document.getElementById('ePrice').value)||0, discount:parseFloat(document.getElementById('eDisc').value)||0, isFree:document.getElementById('eFree').checked, pdfUrl, description:document.getElementById('eDesc').value.trim(), cover }); closeEditModal(); toast('Book updated!'); } catch(e){ toast('Update failed','err'); } };
window.deleteBook = async function(id){ if(!confirm('Permanently delete?')) return; await deleteDoc(doc(db,'books',id)); if(currentUser){ userWishlist = userWishlist.filter(x=>x!==id); userCart = userCart.filter(x=>x!==id); await saveUserField(currentUser.uid,'wishlist',userWishlist); await saveUserField(currentUser.uid,'cart',userCart); updateDots(); } toast('Book deleted'); };
window.closeEditModal = () => document.getElementById('editModal').style.display='none';
window.saveCopyright = function(){ saveCopy(document.getElementById('copyInput').value); toast('Copyright saved'); };

// Firestore realtime books
const booksQuery = query(collection(db,'books'), orderBy('createdAt','desc'));
onSnapshot(booksQuery, (snap) => { books = snap.docs.map(d=>{ const data=d.data(); return {id:d.id, discount:0, isFree:false, publishDate:'', pdfUrl:'', description:'', cover:'', coverColor:0, ...data}; }); if(books.length===0){ const samples = [{title:'The Midnight Library',author:'Matt Haig',category:'Fiction',price:499,discount:20,isFree:false,pdfUrl:'https://www.gutenberg.org/files/1342/1342-h/1342-h.htm',description:'A magical library.',coverColor:0},{title:'Atomic Habits',author:'James Clear',category:'Non-Fiction',price:599,discount:10,isFree:false,description:'Tiny changes.',coverColor:1},{title:'The Alchemist',author:'Paulo Coelho',category:'Spiritual',price:350,isFree:true,pdfUrl:'https://www.gutenberg.org/files/84/84-h/84-h.htm',description:'Journey of self-discovery.',coverColor:2}]; samples.forEach(async s=>await addDoc(collection(db,'books'), {...s, createdAt:Date.now()})); } else { filterBooks(); updateStats(); renderManageList(); } });
isAuthor = sessionStorage.getItem('bibek_sess') === 'true';
document.getElementById('siteFooter').textContent = getCopy();
</script>
</body>
</html>

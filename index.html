<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bibek Books | Digital Bookstore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f5f0;
            --card-bg: #ffffff;
            --text: #1c1a17;
            --text-secondary: #6b6057;
            --accent: #2e6b50;
            --accent-light: #e6f0eb;
            --gold: #b8823a;
            --gold-light: #fdf3e0;
            --danger: #c0392b;
            --border: #e5ddd5;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
            --shadow: 0 6px 24px rgba(0,0,0,0.09);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.14);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
            --navbar-h: 68px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── NAVBAR ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(248,245,240,0.93);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            height: var(--navbar-h);
            display: flex; align-items: center;
            padding: 0 28px; gap: 18px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem; font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            white-space: nowrap;
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
        .logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.1rem; flex-shrink: 0;
        }
        .search-wrap {
            flex: 1; max-width: 460px; position: relative; margin: 0 auto;
        }
        .search-wrap input {
            width: 100%; padding: 10px 18px 10px 44px;
            border: 2px solid var(--border); border-radius: 50px;
            font-size: 0.92rem; font-family: inherit;
            background: var(--card-bg); color: var(--text);
            outline: none; transition: var(--transition);
        }
        .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }
        .search-wrap .s-icon {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: #aaa;
            pointer-events: none; font-size: 1rem;
        }
        .nav-actions { display: flex; gap: 8px; align-items: center; }
        .btn-icon {
            width: 42px; height: 42px; border-radius: 50%;
            border: none; background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; transition: var(--transition);
            position: relative; color: var(--text-secondary);
        }
        .btn-icon:hover { background: #ede8e2; color: var(--text); }
        .btn-icon.active-author { background: var(--gold-light); color: var(--gold); }
        .badge-dot {
            position: absolute; top: 7px; right: 7px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--bg);
            display: none;
        }

        /* ── MAIN ── */
        .main-wrap { max-width: 1300px; margin: 0 auto; padding: 32px 28px 80px; }

        /* ── HERO ── */
        .hero {
            text-align: center; padding: 36px 20px 28px;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem; font-weight: 800;
            color: var(--text); letter-spacing: -0.8px;
            margin-bottom: 10px;
        }
        .hero p { color: var(--text-secondary); font-size: 1.05rem; max-width: 480px; margin: 0 auto; }

        /* ── AUTHOR PANEL ── */
        .author-panel {
            background: var(--card-bg);
            border: 2px solid var(--gold-light);
            border-radius: var(--radius);
            padding: 28px; margin-bottom: 30px;
            display: none; box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }
        .author-panel.visible { display: block; }
        .author-panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem; color: var(--gold);
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-grid .full-w { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-weight: 600; font-size: 0.82rem; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            padding: 10px 14px; border: 2px solid var(--border);
            border-radius: var(--radius-sm); font-family: inherit;
            font-size: 0.9rem; background: #fff;
            color: var(--text); transition: var(--transition); resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .checkbox-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border: 2px solid var(--border);
            border-radius: var(--radius-sm); background: #fff;
        }
        .checkbox-row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-row label { margin: 0; font-weight: 500; font-size: 0.88rem; cursor: pointer; color: var(--text); }
        .panel-actions { display: flex; gap: 12px; margin: 20px 0 16px; flex-wrap: wrap; }
        .manage-list { max-height: 280px; overflow-y: auto; margin-top: 12px; }
        .manage-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-radius: 50px;
            padding: 8px 16px; margin-bottom: 8px;
            border: 1px solid var(--border); gap: 10px;
            transition: var(--transition);
        }
        .manage-item:hover { border-color: #ccc; }
        .manage-item-info { flex: 1; min-width: 0; }
        .manage-item-title { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .manage-item-meta { font-size: 0.75rem; color: #999; }
        .copyright-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }

        /* ── SECTION HEADER ── */
        .section-header {
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap;
            gap: 14px; margin-bottom: 20px;
        }
        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; font-weight: 700; color: var(--text);
        }
        .category-pills { display: flex; gap: 8px; flex-wrap: wrap; }
        .pill {
            padding: 7px 18px; border-radius: 50px;
            border: 2px solid var(--border); background: var(--card-bg);
            cursor: pointer; font-size: 0.84rem; font-family: inherit;
            transition: var(--transition); color: var(--text-secondary);
            font-weight: 500; white-space: nowrap;
        }
        .pill:hover { border-color: #bbb; color: var(--text); }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ── BOOK GRID ── */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 22px;
        }
        .book-card {
            background: var(--card-bg); border-radius: var(--radius);
            overflow: hidden; border: 1px solid var(--border);
            transition: var(--transition); cursor: pointer;
            position: relative; display: flex; flex-direction: column;
            box-shadow: var(--shadow-sm);
        }
        .book-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: #d0c8be; }
        .book-cover {
            width: 100%; aspect-ratio: 2/2.9;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 700; color: #fff;
            text-align: center; padding: 18px;
            letter-spacing: 0.3px; position: relative; overflow: hidden;
        }
        .book-cover img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }
        .cover-text { position: relative; z-index: 1; text-shadow: 0 2px 8px rgba(0,0,0,0.35); line-height: 1.3; }
        .read-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.65); color: #fff;
            padding: 4px 10px; border-radius: 50px;
            font-size: 0.68rem; font-weight: 700; letter-spacing: 1px;
            z-index: 2; opacity: 0; transform: translateY(-4px);
            transition: var(--transition); pointer-events: none;
        }
        .book-card:hover .read-badge { opacity: 1; transform: translateY(0); }
        .book-info { padding: 14px 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .book-title {
            font-weight: 700; font-size: 0.95rem; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden; color: var(--text);
        }
        .book-author { font-size: 0.78rem; color: var(--text-secondary); }
        .book-meta { font-size: 0.72rem; color: #aaa; }
        .price-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .price-cur { font-weight: 800; font-size: 1.05rem; color: var(--accent); }
        .price-old { font-size: 0.75rem; text-decoration: line-through; color: #aaa; }
        .badge-disc { background: #e57e4a; color: #fff; font-size: 0.68rem; padding: 2px 7px; border-radius: 50px; font-weight: 700; }
        .badge-free { background: var(--accent); color: #fff; font-size: 0.7rem; padding: 3px 10px; border-radius: 50px; font-weight: 700; }
        .card-actions { display: flex; gap: 8px; margin-top: 8px; }
        .act-btn {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            padding: 7px 10px; border-radius: 50px;
            font-size: 0.75rem; font-weight: 500;
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
            cursor: pointer; transition: var(--transition); font-family: inherit;
            text-decoration: none; color: var(--text);
        }
        .act-btn:hover { background: #e8e2db; }
        .act-btn.saved { color: #c0392b; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center; padding: 60px 20px;
            grid-column: 1 / -1; color: var(--text-secondary);
        }
        .empty-state .empty-icon { font-size: 3.5rem; margin-bottom: 14px; }
        .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 6px; color: #999; }
        .empty-state p { font-size: 0.9rem; color: #bbb; }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.72);
            display: flex; align-items: center; justify-content: center;
            padding: 20px; animation: fadeIn 0.2s ease;
        }
        .modal {
            background: #fff; border-radius: var(--radius);
            width: 100%; max-width: 880px;
            max-height: 90vh; display: flex; flex-direction: column;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; overflow: hidden;
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; border-bottom: 1px solid var(--border); gap: 12px;
        }
        .modal-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .modal-close {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: #f0ece7; cursor: pointer;
            font-size: 1.1rem; display: flex; align-items: center;
            justify-content: center; transition: var(--transition); flex-shrink: 0;
        }
        .modal-close:hover { background: #e0dbd4; }
        .modal-body { flex: 1; overflow: auto; min-height: 380px; background: #f7f5f2; }
        .modal-body iframe { width: 100%; height: 65vh; border: none; display: block; }
        .modal-footer {
            padding: 14px 22px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
        }

        /* Edit Modal */
        .edit-modal-card {
            background: #fff; border-radius: 24px;
            max-width: 560px; width: 90%; max-height: 85vh;
            overflow-y: auto; padding: 28px;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease;
        }
        .edit-modal-card h3 { font-family: 'Playfair Display', serif; margin-bottom: 18px; font-size: 1.15rem; }

        /* Wishlist Modal */
        .wishlist-card {
            background: #fff; border-radius: 24px;
            max-width: 500px; width: 90%; max-height: 80vh;
            overflow-y: auto; padding: 28px;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease;
        }
        .wishlist-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .wishlist-item:last-child { border-bottom: none; }

        /* ── BUTTONS ── */
        .btn {
            padding: 9px 22px; border-radius: 50px; border: none;
            cursor: pointer; font-family: inherit; font-weight: 600;
            font-size: 0.88rem; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 6px;
            text-decoration: none;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #235741; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(46,107,80,0.3); }
        .btn-outline { background: #fff; color: var(--accent); border: 2px solid var(--accent); }
        .btn-outline:hover { background: var(--accent-light); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-sm { padding: 6px 15px; font-size: 0.8rem; }

        /* ── TOAST ── */
        .toast-container {
            position: fixed; bottom: 24px; left: 24px; z-index: 999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 20px; border-radius: 50px; color: #fff;
            font-weight: 500; font-size: 0.88rem;
            animation: slideInLeft 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            box-shadow: var(--shadow); max-width: 360px;
        }
        .toast.success { background: #2e7d52; }
        .toast.error   { background: #c0392b; }
        .toast.info    { background: #2171a8; }

        /* ── FOOTER ── */
        .site-footer {
            background: #f0ece5; border-top: 1px solid var(--border);
            padding: 28px 24px; text-align: center;
            font-size: 0.72rem; color: var(--text-secondary);
            white-space: pre-line; margin-top: 60px;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes slideUp { from { transform:translateY(28px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @keyframes slideInLeft { from { transform:translateX(-110%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes fadeOut { to { opacity:0; transform:translateY(6px); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .navbar { padding: 0 14px; gap: 10px; }
            .logo { font-size: 1.3rem; }
            .hero h1 { font-size: 2rem; }
            .form-grid { grid-template-columns: 1fr; }
            .form-grid .full-w { grid-column: 1; }
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .main-wrap { padding: 20px 16px 60px; }
        }
        @media (max-width: 480px) {
            .search-wrap { max-width: 100%; }
            .hero h1 { font-size: 1.65rem; }
        }
    </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- NAVBAR -->
<nav class="navbar">
    <a class="logo" href="#">
        <div class="logo-icon">📚</div>
        Bibek Books
    </a>
    <div class="search-wrap">
        <span class="s-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search books, authors, categories…" oninput="filterBooks()">
    </div>
    <div class="nav-actions">
        <button class="btn-icon" id="wishlistBtn" title="Wishlist" onclick="openWishlistModal()">
            ❤️ <span class="badge-dot" id="wishDot"></span>
        </button>
        <button class="btn-icon" id="authorToggleBtn" title="Author Studio" onclick="toggleAuthorPanel()">✍️</button>
    </div>
</nav>

<!-- MAIN -->
<div class="main-wrap">

    <!-- HERO -->
    <div class="hero">
        <h1>📖 Bibek Books</h1>
        <p>Discover curated books — buy, read, and save your favourites, all in one place.</p>
    </div>

    <!-- AUTHOR PANEL -->
    <div class="author-panel" id="authorPanel">
        <div class="author-panel-title">✍️ Author Studio</div>
        <div id="authorPanelContent"></div>
    </div>

    <!-- SECTION HEADER -->
    <div class="section-header">
        <h2 id="sectionTitle">All Books</h2>
        <div class="category-pills" id="categoryPills"></div>
    </div>

    <!-- BOOK GRID -->
    <div class="book-grid" id="bookGrid"></div>

</div>

<!-- FOOTER -->
<div class="site-footer" id="siteFooter"></div>

<!-- READ MODAL -->
<div class="modal-overlay" id="readModal" style="display:none" onclick="if(event.target===this)closeReadModal()">
    <div class="modal">
        <div class="modal-header">
            <h3 id="readModalTitle">Book Title</h3>
            <button class="modal-close" onclick="closeReadModal()">✕</button>
        </div>
        <div class="modal-body" id="readModalBody"></div>
        <div class="modal-footer" id="readModalFooter"></div>
    </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal" style="display:none" onclick="if(event.target===this)closeEditModal()">
    <div class="edit-modal-card">
        <h3>✏️ Edit Book</h3>
        <input type="hidden" id="editBookId">
        <div class="form-group" style="margin-bottom:12px"><label>Title</label><input id="eTitle"></div>
        <div class="form-group" style="margin-bottom:12px"><label>Author</label><input id="eAuthor"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
            <div class="form-group"><label>Publish Date</label><input type="date" id="eDate"></div>
            <div class="form-group"><label>Category</label>
                <select id="eCat">
                    <option>Spiritual</option><option>Fiction</option><option>Non-Fiction</option>
                    <option>Science</option><option>History</option><option>Poetry</option><option>Business</option>
                </select>
            </div>
            <div class="form-group"><label>Price (₹)</label><input type="number" id="ePrice"></div>
            <div class="form-group"><label>Discount (%)</label><input type="number" id="eDisc" min="0" max="90"></div>
        </div>
        <div class="checkbox-row" style="margin-bottom:12px">
            <input type="checkbox" id="eFree"><label for="eFree">📖 Make this book FREE</label>
        </div>
        <div class="form-group" style="margin-bottom:12px"><label>Cover Image (replace)</label><input type="file" id="eCover" accept="image/*"></div>
        <div class="form-group" style="margin-bottom:12px"><label>PDF / Read URL</label><input id="ePdf" placeholder="https://..."></div>
        <div class="form-group" style="margin-bottom:18px"><label>Description</label><textarea id="eDesc" rows="2"></textarea></div>
        <div style="display:flex;gap:12px">
            <button class="btn btn-primary" onclick="confirmEdit()">💾 Save Changes</button>
            <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<!-- WISHLIST MODAL -->
<div class="modal-overlay" id="wishlistModal" style="display:none" onclick="if(event.target===this)closeWishlistModal()">
    <div class="wishlist-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
            <h3 style="font-family:'Playfair Display',serif;font-size:1.15rem;">❤️ Your Wishlist</h3>
            <button class="modal-close" onclick="closeWishlistModal()">✕</button>
        </div>
        <div id="wishlistItems"></div>
    </div>
</div>

<script>
// ── CONSTANTS ──
const STORAGE_BOOKS = 'bibek_books_v2';
const STORAGE_PASS  = 'bibek_author_pass';
const STORAGE_COPY  = 'bibek_copyright';
const WISHLIST_KEY  = 'bibek_wishlist';
const DEFAULT_PASS  = 'author123';
const DEFAULT_COPYRIGHT = `Copyright © 2026 by Bibek Patra\n\nAll rights reserved. No part of this publication may be reproduced, stored, or transmitted in any form without written permission from the publisher.\n\nFirst edition, 2026`;
const CATEGORIES = ['Spiritual','Fiction','Non-Fiction','Science','History','Poetry','Business'];
const COVER_COLORS = [
    ['#2e6b50','#5aad7f'], ['#7b4a1e','#c4824f'], ['#1a4e7a','#4a90c9'],
    ['#5c3378','#a066cc'], ['#b84c38','#e07a68'], ['#27606e','#4db6c8'],
    ['#394f5e','#708fa8'], ['#4a3828','#8a7060'],
];

let books = [];
let wishlist = [];
let isAuthorLogged = false;
let activeCategory = 'All';
let currentSearch = '';

// ── HELPERS ──
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function escHtml(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function saveBooks()  { localStorage.setItem(STORAGE_BOOKS, JSON.stringify(books)); }
function getPass()    { return localStorage.getItem(STORAGE_PASS) || DEFAULT_PASS; }
function setPass(p)   { localStorage.setItem(STORAGE_PASS, p); }
function getCopy()    { return localStorage.getItem(STORAGE_COPY) || DEFAULT_COPYRIGHT; }
function saveCopy(t)  { localStorage.setItem(STORAGE_COPY, t); }
function getWish()    { try { return JSON.parse(localStorage.getItem(WISHLIST_KEY))||[]; } catch { return []; } }
function saveWish(w)  { localStorage.setItem(WISHLIST_KEY, JSON.stringify(w)); }
function inWish(id)   { return wishlist.includes(id); }

function showToast(msg, type='success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3300);
}

function calcPrice(b) {
    if (b.isFree) return { cur: 0, orig: b.price, disc: 0 };
    const d = Math.max(0, Math.min(90, b.discount||0));
    return { cur: d>0 ? Math.round(b.price*(1-d/100)) : b.price, orig: b.price, disc: d };
}

function readFileAsDataURL(file) {
    return new Promise((res, rej) => {
        if (!file) { res(''); return; }
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.onerror = () => rej(r.error);
        r.readAsDataURL(file);
    });
}

// ── INIT DATA ──
function loadData() {
    const raw = localStorage.getItem(STORAGE_BOOKS);
    if (raw) {
        books = JSON.parse(raw).map(b => ({
            discount: 0, isFree: false, publishDate: '', pdfUrl: '', description: '', cover: '', ...b
        }));
    } else {
        books = getSampleBooks();
        saveBooks();
    }
    wishlist = getWish();
    isAuthorLogged = sessionStorage.getItem('bibek_session') === 'true';
}

function getSampleBooks() {
    return [
        { id: uid(), title: 'The Midnight Library', author: 'Matt Haig', category: 'Fiction', price: 499, discount: 20, isFree: false, publishDate: '2020-09-29', pdfUrl: 'https://www.gutenberg.org/files/1342/1342-h/1342-h.htm', description: 'Between life and death there is a library.', cover: '', coverColor: 0 },
        { id: uid(), title: 'Atomic Habits', author: 'James Clear', category: 'Non-Fiction', price: 599, discount: 10, isFree: false, publishDate: '2018-10-16', pdfUrl: '', description: 'Tiny changes, remarkable results.', cover: '', coverColor: 1 },
        { id: uid(), title: 'Sapiens', author: 'Yuval Noah Harari', category: 'History', price: 699, discount: 0, isFree: false, publishDate: '2011-01-01', pdfUrl: 'https://www.gutenberg.org/files/345/345-h/345-h.htm', description: 'A brief history of humankind.', cover: '', coverColor: 2 },
        { id: uid(), title: 'The Alchemist', author: 'Paulo Coelho', category: 'Spiritual', price: 350, discount: 0, isFree: true, publishDate: '1988-01-01', pdfUrl: 'https://www.gutenberg.org/files/84/84-h/84-h.htm', description: 'A journey of self-discovery.', cover: '', coverColor: 3 },
        { id: uid(), title: 'A Brief History of Time', author: 'Stephen Hawking', category: 'Science', price: 450, discount: 15, isFree: false, publishDate: '1988-04-01', pdfUrl: '', description: 'Exploring the universe.', cover: '', coverColor: 4 },
        { id: uid(), title: 'Think and Grow Rich', author: 'Napoleon Hill', category: 'Business', price: 299, discount: 5, isFree: false, publishDate: '1937-03-26', pdfUrl: '', description: 'The philosophy of success.', cover: '', coverColor: 5 },
    ];
}

// ── RENDER ──
function coverEl(b) {
    if (b.cover) return `<img class="book-cover" src="${escHtml(b.cover)}" alt="${escHtml(b.title)}" loading="lazy" style="aspect-ratio:2/2.9;object-fit:cover;width:100%">`;
    const ci = b.coverColor !== undefined ? (b.coverColor % COVER_COLORS.length) : (b.title.charCodeAt(0) % COVER_COLORS.length);
    const [c1, c2] = COVER_COLORS[ci];
    return `<div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})"><span class="cover-text">${escHtml(b.title)}</span></div>`;
}

function priceHTML(b) {
    const { cur, orig, disc } = calcPrice(b);
    if (b.isFree) return `<span class="badge-free">FREE</span>`;
    return `<span class="price-cur">₹${cur}</span>${disc>0?`<span class="price-old">₹${orig}</span><span class="badge-disc">${disc}% off</span>`:''}`;
}

function bookCardHTML(b) {
    const saved = inWish(b.id);
    const readBtn = b.pdfUrl
        ? `<a class="act-btn" href="${escHtml(b.pdfUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📖 Read</a>`
        : `<button class="act-btn" disabled style="opacity:0.4;cursor:default">📖 Read</button>`;
    return `<div class="book-card" onclick="openBook('${b.id}')">
        ${coverEl(b)}
        <div class="book-info">
            <div class="book-title">${escHtml(b.title)}</div>
            <div class="book-author">${escHtml(b.author)}</div>
            <div class="book-meta">${escHtml(b.category)}${b.publishDate?' · '+b.publishDate.slice(0,4):''}</div>
            <div class="price-row">${priceHTML(b)}</div>
            ${b.description?`<div style="font-size:0.7rem;color:#8a7b6e;margin-top:4px">${escHtml(b.description.slice(0,65))}${b.description.length>65?'…':''}</div>`:''}
            <div class="card-actions">
                ${readBtn}
                <button class="act-btn ${saved?'saved':''}" onclick="event.stopPropagation();toggleWish('${b.id}')" id="wbtn-${b.id}">
                    ${saved?'❤️ Saved':'🤍 Save'}
                </button>
            </div>
        </div>
        ${b.pdfUrl?`<span class="read-badge">READ</span>`:''}
    </div>`;
}

function renderBooks(list) {
    const grid = document.getElementById('bookGrid');
    if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No books found</h3><p>Try a different search or category, or publish a new book via Author Studio.</p></div>`;
        return;
    }
    grid.innerHTML = list.map(bookCardHTML).join('');
}

function renderPills() {
    const cats = ['All', ...CATEGORIES.filter(c => books.some(b => b.category === c))];
    document.getElementById('categoryPills').innerHTML = cats.map(c =>
        `<button class="pill${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c}</button>`
    ).join('');
}

function setCategory(c) { activeCategory = c; filterBooks(); }

function filterBooks() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    let list = activeCategory === 'All' ? books : books.filter(b => b.category === activeCategory);
    if (q) list = list.filter(b =>
        b.title.toLowerCase().includes(q) ||
        b.author.toLowerCase().includes(q) ||
        (b.category||'').toLowerCase().includes(q)
    );
    document.getElementById('sectionTitle').textContent =
        q ? `Results for "${q}"` : (activeCategory === 'All' ? 'All Books' : activeCategory);
    renderPills();
    renderBooks(list);
}

// ── WISHLIST ──
function toggleWish(id) {
    if (inWish(id)) { wishlist = wishlist.filter(x => x!==id); showToast('Removed from wishlist','info'); }
    else { wishlist.push(id); showToast('❤️ Added to wishlist'); }
    saveWish(wishlist);
    updateWishDot();
    const btn = document.getElementById('wbtn-'+id);
    if (btn) { btn.className = `act-btn${inWish(id)?' saved':''}`; btn.innerHTML = inWish(id)?'❤️ Saved':'🤍 Save'; }
}

function updateWishDot() {
    document.getElementById('wishDot').style.display = wishlist.length ? 'block' : 'none';
}

function openWishlistModal() {
    const wlBooks = books.filter(b => wishlist.includes(b.id));
    const container = document.getElementById('wishlistItems');
    if (wlBooks.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:40px;color:#aaa"><div style="font-size:3rem;margin-bottom:12px">❤️</div><p>Your wishlist is empty. Save books to find them here!</p></div>`;
    } else {
        container.innerHTML = wlBooks.map(b => {
            const {cur} = calcPrice(b);
            return `<div class="wishlist-item">
                <div style="flex:1;min-width:0">
                    <div style="font-weight:700;font-size:0.92rem">${escHtml(b.title)}</div>
                    <div style="font-size:0.75rem;color:#aaa">${escHtml(b.author)} · ${escHtml(b.category)}</div>
                    <div style="font-weight:800;color:var(--accent);font-size:0.88rem;margin-top:2px">${b.isFree?'FREE':'₹'+cur}</div>
                </div>
                <button class="btn btn-danger btn-sm" onclick="toggleWish('${b.id}');openWishlistModal()">Remove</button>
            </div>`;
        }).join('');
    }
    document.getElementById('wishlistModal').style.display = 'flex';
}
function closeWishlistModal() { document.getElementById('wishlistModal').style.display = 'none'; }

// ── READ MODAL ──
function openBook(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    document.getElementById('readModalTitle').textContent = b.title;
    const body = document.getElementById('readModalBody');
    if (b.pdfUrl) {
        body.innerHTML = `<iframe src="${escHtml(b.pdfUrl)}" title="${escHtml(b.title)}" sandbox="allow-scripts allow-same-origin"></iframe>`;
    } else {
        body.innerHTML = `<div style="padding:48px;text-align:center;color:#aaa"><div style="font-size:3.5rem;margin-bottom:14px">📖</div><p style="font-size:1rem">${escHtml(b.description)||'No preview available for this book.'}</p></div>`;
    }
    const saved = inWish(b.id);
    document.getElementById('readModalFooter').innerHTML = `
        <button class="btn btn-outline btn-sm" onclick="toggleWish('${b.id}');this.innerHTML=wishlist.includes('${b.id}')?'❤️ Saved':'🤍 Save'">
            ${saved?'❤️ Saved':'🤍 Save'}
        </button>
        ${b.pdfUrl?`<a class="btn btn-primary btn-sm" href="${escHtml(b.pdfUrl)}" target="_blank" rel="noopener">Open Full ↗</a>`:''}
        ${isAuthorLogged?`<button class="btn btn-danger btn-sm" onclick="deleteBook('${b.id}')">🗑️ Delete</button>`:''}
    `;
    document.getElementById('readModal').style.display = 'flex';
}
function closeReadModal() {
    document.getElementById('readModal').style.display = 'none';
    document.getElementById('readModalBody').innerHTML = '';
}

// ── AUTHOR PANEL ──
function toggleAuthorPanel() {
    const panel = document.getElementById('authorPanel');
    const btn = document.getElementById('authorToggleBtn');
    const vis = panel.classList.contains('visible');
    if (!vis) { panel.classList.add('visible'); renderAuthorPanel(); }
    else panel.classList.remove('visible');
    btn.classList.toggle('active-author', !vis);
}

function renderAuthorPanel() {
    const el = document.getElementById('authorPanelContent');
    if (!isAuthorLogged) {
        el.innerHTML = `<div style="max-width:360px">
            <p style="color:var(--text-secondary);font-size:0.88rem;margin-bottom:14px">Enter author passcode to manage books.</p>
            <div class="form-group" style="margin-bottom:10px">
                <input type="password" id="passcodeInput" placeholder="Passcode" style="border:2px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;font-family:inherit;font-size:0.9rem;width:100%;outline:none" onkeydown="if(event.key==='Enter')authorLogin()">
            </div>
            <button class="btn btn-primary" onclick="authorLogin()">🔑 Login</button>
        </div>`;
        return;
    }
    el.innerHTML = `
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
            <button class="btn btn-primary btn-sm" onclick="toggleAddForm()">➕ Add New Book</button>
            <button class="btn btn-outline btn-sm" onclick="changePass()">🔑 Change Password</button>
            <button class="btn btn-outline btn-sm" onclick="authorLogout()">🚪 Logout</button>
        </div>
        <div id="addBookForm" style="display:none;margin-bottom:24px">
            <div class="form-grid" style="margin-bottom:14px">
                <div class="form-group"><label>Book Title *</label><input id="fTitle" placeholder="The Midnight Library"></div>
                <div class="form-group"><label>Author Name *</label><input id="fAuthor" placeholder="Matt Haig"></div>
                <div class="form-group"><label>Publish Date</label><input type="date" id="fDate"></div>
                <div class="form-group"><label>Category</label>
                    <select id="fCat">
                        <option>Spiritual</option><option>Fiction</option><option>Non-Fiction</option>
                        <option>Science</option><option>History</option><option>Poetry</option><option>Business</option>
                    </select>
                </div>
                <div class="form-group"><label>Price (₹)</label><input type="number" id="fPrice" value="499"></div>
                <div class="form-group"><label>Discount (%)</label><input type="number" id="fDisc" value="0" min="0" max="90"></div>
                <div class="full-w checkbox-row">
                    <input type="checkbox" id="fFree"><label for="fFree">📖 Make this book FREE</label>
                </div>
                <div class="form-group"><label>Cover Image</label><input type="file" id="fCover" accept="image/*"></div>
                <div class="form-group"><label>PDF / Read URL</label><input type="url" id="fPdf" placeholder="https://..."></div>
                <div class="form-group full-w"><label>Short Description</label><textarea id="fDesc" rows="2" placeholder="A fascinating story..."></textarea></div>
            </div>
            <button class="btn btn-primary" onclick="publishBook()">🚀 Publish Book</button>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin-bottom:14px">
        <h4 style="font-family:'Playfair Display',serif;margin-bottom:12px;font-size:1rem">📚 Manage Books</h4>
        <div class="manage-list" id="manageList"></div>
        <div class="copyright-section">
            <label style="font-weight:600;font-size:0.82rem;color:var(--text-secondary);display:block;margin-bottom:6px">✍️ Global Copyright Footer</label>
            <textarea id="copyrightInput" rows="5" style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-family:monospace;font-size:0.82rem;resize:vertical">${escHtml(getCopy())}</textarea>
            <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="saveCopyright()">💾 Save Copyright</button>
        </div>`;
    renderManageList();
}

function toggleAddForm() {
    const f = document.getElementById('addBookForm');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function authorLogin() {
    const code = document.getElementById('passcodeInput').value;
    if (code === getPass()) {
        isAuthorLogged = true;
        sessionStorage.setItem('bibek_session','true');
        renderAuthorPanel();
        showToast('✨ Author access granted');
    } else { showToast('❌ Wrong passcode','error'); }
}

function authorLogout() {
    isAuthorLogged = false;
    sessionStorage.removeItem('bibek_session');
    document.getElementById('authorPanel').classList.remove('visible');
    document.getElementById('authorToggleBtn').classList.remove('active-author');
    showToast('Logged out','info');
}

function changePass() {
    const cur = prompt('Enter current password:');
    if (cur !== getPass()) { showToast('❌ Wrong current password','error'); return; }
    const np = prompt('Enter new password (min 4 chars):');
    if (!np || np.length < 4) { showToast('⚠️ Password too short','error'); return; }
    setPass(np);
    showToast('🔑 Password updated!');
}

async function publishBook() {
    const title  = document.getElementById('fTitle').value.trim();
    const author = document.getElementById('fAuthor').value.trim();
    if (!title || !author) { showToast('⚠️ Title and Author are required','error'); return; }
    const file = document.getElementById('fCover').files[0];
    const cover = file ? await readFileAsDataURL(file) : '';
    const ci = Math.floor(Math.random() * COVER_COLORS.length);
    books.unshift({
        id: uid(), title, author,
        publishDate: document.getElementById('fDate').value,
        category: document.getElementById('fCat').value,
        price: parseFloat(document.getElementById('fPrice').value)||0,
        discount: parseFloat(document.getElementById('fDisc').value)||0,
        isFree: document.getElementById('fFree').checked,
        pdfUrl: document.getElementById('fPdf').value.trim(),
        description: document.getElementById('fDesc').value.trim(),
        cover, coverColor: ci
    });
    saveBooks();
    filterBooks();
    renderManageList();
    showToast('✅ Book published!');
    ['fTitle','fAuthor','fPdf','fDesc'].forEach(id => document.getElementById(id).value='');
    document.getElementById('fPrice').value = 499;
    document.getElementById('fDisc').value = 0;
    document.getElementById('fFree').checked = false;
    document.getElementById('fCover').value = '';
}

function renderManageList() {
    const c = document.getElementById('manageList');
    if (!c) return;
    if (books.length === 0) { c.innerHTML = '<p style="color:#aaa;font-size:0.85rem;padding:10px 0">No books yet. Publish your first book above!</p>'; return; }
    c.innerHTML = books.map(b => {
        const {cur, disc} = calcPrice(b);
        return `<div class="manage-item">
            <div class="manage-item-info">
                <div class="manage-item-title">${escHtml(b.title)}</div>
                <div class="manage-item-meta">${escHtml(b.author)} · ₹${b.isFree?0:cur}${disc?' ('+disc+'% off)':''} · ${escHtml(b.category)}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
                <button class="btn btn-outline btn-sm" onclick="openEditModal('${b.id}')">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="deleteBook('${b.id}')">🗑️</button>
            </div>
        </div>`;
    }).join('');
}

function deleteBook(id) {
    if (!confirm('Permanently delete this book?')) return;
    books = books.filter(b => b.id !== id);
    wishlist = wishlist.filter(x => x !== id);
    saveBooks(); saveWish(wishlist);
    filterBooks(); renderManageList(); updateWishDot();
    closeReadModal();
    showToast('Book removed','info');
}

// ── EDIT MODAL ──
function openEditModal(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    document.getElementById('editBookId').value = b.id;
    document.getElementById('eTitle').value     = b.title;
    document.getElementById('eAuthor').value    = b.author;
    document.getElementById('eDate').value      = b.publishDate||'';
    document.getElementById('eCat').value       = b.category||'Fiction';
    document.getElementById('ePrice').value     = b.price;
    document.getElementById('eDisc').value      = b.discount||0;
    document.getElementById('eFree').checked    = b.isFree||false;
    document.getElementById('ePdf').value       = b.pdfUrl||'';
    document.getElementById('eDesc').value      = b.description||'';
    document.getElementById('eCover').value     = '';
    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }

async function confirmEdit() {
    const id = document.getElementById('editBookId').value;
    const idx = books.findIndex(b => b.id === id);
    if (idx === -1) return;
    const file = document.getElementById('eCover').files[0];
    const newCover = file ? await readFileAsDataURL(file) : books[idx].cover;
    books[idx] = {
        ...books[idx],
        title:       document.getElementById('eTitle').value.trim(),
        author:      document.getElementById('eAuthor').value.trim(),
        publishDate: document.getElementById('eDate').value,
        category:    document.getElementById('eCat').value,
        price:       parseFloat(document.getElementById('ePrice').value)||0,
        discount:    parseFloat(document.getElementById('eDisc').value)||0,
        isFree:      document.getElementById('eFree').checked,
        pdfUrl:      document.getElementById('ePdf').value.trim(),
        description: document.getElementById('eDesc').value.trim(),
        cover:       newCover
    };
    saveBooks(); filterBooks(); renderManageList();
    closeEditModal();
    showToast('✅ Book updated!');
}

// ── COPYRIGHT ──
function saveCopyright() {
    const text = document.getElementById('copyrightInput').value;
    saveCopy(text);
    document.getElementById('siteFooter').textContent = text;
    showToast('💾 Copyright saved!');
}

// ── INIT ──
loadData();
document.getElementById('siteFooter').textContent = getCopy();
updateWishDot();
filterBooks();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLibrary - Free Digital Books</title>
    <style>
        :root {
            --bg: #faf9f6;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #555;
            --accent: #4a6d5c;
            --accent-light: #e8f0ec;
            --gold: #b8944b;
            --gold-light: #fdf3e0;
            --danger: #c0392b;
            --danger-light: #fdecea;
            --border: #e8e5df;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-heading: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            --navbar-height: 64px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ──────────────── NAVBAR ──────────────── */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            height: var(--navbar-height);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            transition: var(--transition);
        }
        .navbar .logo {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar .logo svg {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }
        .search-wrapper {
            flex: 1;
            max-width: 480px;
            position: relative;
            margin: 0 auto;
        }
        .search-wrapper input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            border: 2px solid var(--border);
            border-radius: 50px;
            font-size: 0.95rem;
            font-family: var(--font-body);
            background: var(--card-bg);
            transition: var(--transition);
            outline: none;
            color: var(--text);
        }
        .search-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }
        .search-wrapper .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            pointer-events: none;
            transition: var(--transition);
        }
        .search-wrapper input:focus ~ .search-icon {
            color: var(--accent);
        }
        .nav-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            color: #666;
            position: relative;
        }
        .btn-icon:hover {
            background: #f0f0f0;
            color: var(--text);
        }
        .btn-icon.active-author {
            color: var(--gold);
            background: var(--gold-light);
        }
        .badge-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid #fff;
        }

        /* ──────────────── MAIN LAYOUT ──────────────── */
        .main-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }
        .hero {
            text-align: center;
            padding: 40px 20px 32px;
        }
        .hero h1 {
            font-family: var(--font-heading);
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .section-header h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
        }
        .category-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pill {
            padding: 7px 16px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--card-bg);
            cursor: pointer;
            font-size: 0.85rem;
            font-family: var(--font-body);
            transition: var(--transition);
            white-space: nowrap;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .pill:hover {
            border-color: #ccc;
            color: var(--text);
        }
        .pill.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ──────────────── BOOK GRID ──────────────── */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        .book-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }
        .book-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: #d5d0c8;
        }
        .book-cover {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            padding: 20px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .book-cover .cover-text {
            position: relative;
            z-index: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            line-height: 1.3;
        }
        .book-info {
            padding: 14px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .book-info .book-title {
            font-weight: 600;
            font-size: 0.95rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text);
        }
        .book-info .book-author {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .book-info .book-meta {
            font-size: 0.75rem;
            color: #999;
            margin-top: 2px;
        }
        .book-card .read-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            z-index: 2;
            opacity: 0;
            transform: translateY(-5px);
            transition: var(--transition);
            pointer-events: none;
        }
        .book-card:hover .read-badge {
            opacity: 1;
            transform: translateY(0);
        }

        /* ──────────────── EMPTY STATE ──────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }
        .empty-state svg {
            width: 100px;
            height: 100px;
            color: #ccc;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            color: #888;
            margin-bottom: 8px;
        }
        .empty-state p {
            color: #aaa;
            font-size: 0.95rem;
        }

        /* ──────────────── MODAL ──────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
            overflow: hidden;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .modal-header h3 {
            font-family: var(--font-heading);
            font-size: 1.1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            color: #555;
        }
        .modal-close:hover {
            background: #e0e0e0;
            color: #000;
        }
        .modal-body {
            flex: 1;
            overflow: auto;
            min-height: 400px;
            background: #f5f5f5;
        }
        .modal-body iframe {
            width: 100%;
            height: 70vh;
            border: none;
            display: block;
        }
        .modal-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        /* ──────────────── BUTTONS ──────────────── */
        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 0.9rem;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover {
            background: #3d5c4d;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 109, 92, 0.3);
        }
        .btn-outline {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-outline:hover {
            background: var(--accent-light);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
        }
        .btn-danger:hover {
            background: #a93226;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        /* ──────────────── AUTHOR PANEL ──────────────── */
        .author-panel {
            background: #fffef9;
            border: 2px solid var(--gold-light);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 28px;
            display: none;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow);
        }
        .author-panel.visible {
            display: block;
        }
        .author-panel h3 {
            font-family: var(--font-heading);
            margin-bottom: 16px;
            color: var(--gold);
            font-size: 1.2rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-grid .full-width {
            grid-column: 1 / -1;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition);
            background: #fff;
            resize: vertical;
            color: var(--text);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .form-group textarea {
            min-height: 80px;
        }
        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #fafaf9;
        }
        .file-upload-area:hover {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .file-upload-area .upload-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .file-upload-area p {
            font-size: 0.85rem;
            color: #888;
        }
        .file-upload-area .file-name {
            font-weight: 600;
            color: var(--accent);
            margin-top: 4px;
        }
        .manage-books-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .manage-book-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            background: #fff;
            gap: 12px;
            transition: var(--transition);
        }
        .manage-book-item:hover {
            border-color: #ccc;
        }
        .manage-book-item .item-info {
            flex: 1;
            min-width: 0;
        }
        .manage-book-item .item-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .manage-book-item .item-meta {
            font-size: 0.75rem;
            color: #999;
        }

        /* ──────────────── TOAST ──────────────── */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            color: #fff;
            font-weight: 500;
            font-size: 0.9rem;
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            box-shadow: var(--shadow);
            max-width: 380px;
        }
        .toast.success { background: #27ae60; }
        .toast.error   { background: #e74c3c; }
        .toast.info    { background: #2980b9; }
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ──────────────── LOGIN MODAL ──────────────── */
        .login-modal {
            max-width: 420px;
            padding: 32px 28px;
        }
        .login-modal h3 {
            font-family: var(--font-heading);
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.3rem;
        }
        .login-modal .subtitle {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .login-modal input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: var(--font-body);
            margin-bottom: 12px;
            transition: var(--transition);
        }
        .login-modal input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        /* ──────────────── RESPONSIVE ──────────────── */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 12px;
                gap: 8px;
            }
            .navbar .logo {
                font-size: 1.2rem;
            }
            .navbar .logo svg {
                width: 26px;
                height: 26px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .book-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 14px;
            }
            .modal {
                max-height: 95vh;
            }
        }

        @media (max-width: 480px) {
            .search-wrapper {
                max-width: 100%;
            }
            .hero h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- TOAST CONTAINER -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="4" width="10" height="24" rx="2" fill="#4a6d5c"/>
                <rect x="16" y="4" width="12" height="24" rx="2" fill="#b8944b" opacity="0.7"/>
                <rect x="6" y="8" width="6" height="1.5" rx="0.75" fill="white" opacity="0.6"/>
                <rect x="6" y="11" width="4" height="1.5" rx="0.75" fill="white" opacity="0.6"/>
            </svg>
            OpenLibrary
        </div>

        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search books, authors…" oninput="filterBooks()">
            <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
        </div>

        <div class="nav-actions">
            <!-- Author toggle -->
            <button class="btn-icon" id="authorToggleBtn" title="Author Panel" onclick="toggleAuthorPanel()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>
                </svg>
            </button>
            <!-- Bookmarks -->
            <button class="btn-icon" id="bookmarkBtn" title="Bookmarks" onclick="showBookmarks()">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
                <span class="badge-dot" id="bookmarkDot" style="display:none"></span>
            </button>
        </div>
    </nav>

    <!-- MAIN -->
    <div class="main-container">

        <!-- HERO -->
        <div class="hero">
            <h1>📚 Free Digital Books</h1>
            <p>Discover, read, and share knowledge — completely free, forever.</p>
        </div>

        <!-- AUTHOR PANEL -->
        <div class="author-panel" id="authorPanel">
            <h3>✍️ Author Dashboard</h3>
            <div id="authorPanelContent">
                <!-- Login or upload form rendered here by JS -->
            </div>
        </div>

        <!-- SECTION HEADER -->
        <div class="section-header">
            <h2 id="sectionTitle">All Books</h2>
            <div class="category-pills" id="categoryPills"></div>
        </div>

        <!-- BOOK GRID -->
        <div class="book-grid" id="bookGrid"></div>

    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" style="display:none" onclick="handleOverlayClick(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Book Title</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <script>
    // ──────────────────────────────────────────────
    //  DATA
    // ──────────────────────────────────────────────
    const COVER_COLORS = [
        ['#2c3e50','#3498db'], ['#6d4c41','#a1887f'], ['#1b5e20','#66bb6a'],
        ['#4a148c','#ce93d8'], ['#bf360c','#ff8a65'], ['#006064','#4dd0e1'],
        ['#37474f','#90a4ae'], ['#4e342e','#bcaaa4'],
    ];

    let books = JSON.parse(localStorage.getItem('ol_books') || '[]');
    let bookmarks = JSON.parse(localStorage.getItem('ol_bookmarks') || '[]');
    let authorLoggedIn = localStorage.getItem('ol_author') === 'true';
    let activeCategory = 'All';
    let currentFile = null;

    // Pre-load sample books if empty
    if (books.length === 0) {
        books = [
            { id: 1, title: 'Pride and Prejudice', author: 'Jane Austen', category: 'Fiction', year: 1813, description: 'A classic romance novel.', url: 'https://www.gutenberg.org/files/1342/1342-h/1342-h.htm', coverColor: 0 },
            { id: 2, title: 'Moby-Dick', author: 'Herman Melville', category: 'Adventure', year: 1851, description: 'The hunt for the white whale.', url: 'https://www.gutenberg.org/files/2701/2701-h/2701-h.htm', coverColor: 1 },
            { id: 3, title: 'The Art of War', author: 'Sun Tzu', category: 'Philosophy', year: 500, description: 'Ancient Chinese military strategy.', url: 'https://www.gutenberg.org/files/132/132-h/132-h.htm', coverColor: 2 },
            { id: 4, title: 'Frankenstein', author: 'Mary Shelley', category: 'Horror', year: 1818, description: 'A scientist creates life.', url: 'https://www.gutenberg.org/files/84/84-h/84-h.htm', coverColor: 3 },
            { id: 5, title: 'The Great Gatsby', author: 'F. Scott Fitzgerald', category: 'Fiction', year: 1925, description: 'The Jazz Age and the American Dream.', url: 'https://www.gutenberg.org/files/64317/64317-h/64317-h.htm', coverColor: 4 },
            { id: 6, title: 'Dracula', author: 'Bram Stoker', category: 'Horror', year: 1897, description: 'The original vampire tale.', url: 'https://www.gutenberg.org/files/345/345-h/345-h.htm', coverColor: 5 },
        ];
        saveBooks();
    }

    // ──────────────────────────────────────────────
    //  HELPERS
    // ──────────────────────────────────────────────
    function saveBooks()     { localStorage.setItem('ol_books',     JSON.stringify(books)); }
    function saveBookmarks() { localStorage.setItem('ol_bookmarks', JSON.stringify(bookmarks)); }

    function showToast(msg, type = 'success') {
        const t = document.createElement('div');
        t.className = `toast ${type}`;
        t.textContent = msg;
        document.getElementById('toastContainer').appendChild(t);
        setTimeout(() => t.remove(), 3200);
    }

    function getCategories() {
        const cats = [...new Set(books.map(b => b.category))].sort();
        return ['All', ...cats];
    }

    function isBookmarked(id) { return bookmarks.includes(id); }

    // ──────────────────────────────────────────────
    //  RENDER
    // ──────────────────────────────────────────────
    function renderPills() {
        const container = document.getElementById('categoryPills');
        container.innerHTML = '';
        getCategories().forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'pill' + (cat === activeCategory ? ' active' : '');
            btn.textContent = cat;
            btn.onclick = () => { activeCategory = cat; renderAll(); };
            container.appendChild(btn);
        });
    }

    function renderBooks(list) {
        const grid = document.getElementById('bookGrid');
        grid.innerHTML = '';

        if (list.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <svg fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
                        <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                    <h3>No books found</h3>
                    <p>Try a different search or category.</p>
                </div>`;
            return;
        }

        list.forEach(book => {
            const colors = COVER_COLORS[book.coverColor % COVER_COLORS.length];
            const card = document.createElement('div');
            card.className = 'book-card';
            card.onclick = () => openBook(book);
            card.innerHTML = `
                <div class="book-cover" style="background: linear-gradient(135deg, ${colors[0]}, ${colors[1]})">
                    <span class="cover-text">${book.title}</span>
                </div>
                <div class="book-info">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                    <div class="book-meta">${book.category} · ${book.year}</div>
                </div>
                <span class="read-badge">READ</span>`;
            grid.appendChild(card);
        });
    }

    function filterBooks() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let list = activeCategory === 'All' ? books : books.filter(b => b.category === activeCategory);
        if (q) list = list.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q));
        document.getElementById('sectionTitle').textContent = q ? `Results for "${q}"` : (activeCategory === 'All' ? 'All Books' : activeCategory);
        renderBooks(list);
    }

    function renderAll() {
        renderPills();
        filterBooks();
        updateBookmarkDot();
    }

    function updateBookmarkDot() {
        document.getElementById('bookmarkDot').style.display = bookmarks.length ? 'block' : 'none';
    }

    // ──────────────────────────────────────────────
    //  BOOK MODAL
    // ──────────────────────────────────────────────
    function openBook(book) {
        document.getElementById('modalTitle').textContent = book.title;
        const body = document.getElementById('modalBody');
        const footer = document.getElementById('modalFooter');

        if (book.url) {
            body.innerHTML = `<iframe src="${book.url}" title="${book.title}" sandbox="allow-scripts allow-same-origin"></iframe>`;
        } else if (book.content) {
            body.innerHTML = `<div style="padding:24px;max-width:700px;margin:auto;line-height:1.8;font-size:1rem">${book.content}</div>`;
        } else {
            body.innerHTML = `<div style="padding:40px;text-align:center;color:#888"><p style="font-size:3rem">📖</p><p style="margin-top:12px">${book.description || 'No preview available.'}</p></div>`;
        }

        const bm = isBookmarked(book.id);
        footer.innerHTML = `
            <button class="btn btn-outline btn-sm" onclick="toggleBookmark(${book.id})" id="bmBtn">
                ${bm ? '🔖 Saved' : '🔖 Save'}
            </button>
            ${book.url ? `<a class="btn btn-primary btn-sm" href="${book.url}" target="_blank" rel="noopener">Open Full ↗</a>` : ''}
            ${authorLoggedIn ? `<button class="btn btn-danger btn-sm" onclick="deleteBook(${book.id})">Delete</button>` : ''}
        `;

        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        document.getElementById('modalBody').innerHTML = '';
    }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    // ──────────────────────────────────────────────
    //  BOOKMARKS
    // ──────────────────────────────────────────────
    function toggleBookmark(id) {
        if (isBookmarked(id)) {
            bookmarks = bookmarks.filter(b => b !== id);
            showToast('Removed from bookmarks', 'info');
        } else {
            bookmarks.push(id);
            showToast('Saved to bookmarks!');
        }
        saveBookmarks();
        updateBookmarkDot();
        const btn = document.getElementById('bmBtn');
        if (btn) btn.textContent = isBookmarked(id) ? '🔖 Saved' : '🔖 Save';
    }

    function showBookmarks() {
        const saved = books.filter(b => bookmarks.includes(b.id));
        document.getElementById('modalTitle').textContent = '🔖 My Bookmarks';
        const body = document.getElementById('modalBody');
        const footer = document.getElementById('modalFooter');
        footer.innerHTML = '';

        if (saved.length === 0) {
            body.innerHTML = `<div style="padding:60px;text-align:center;color:#aaa"><p style="font-size:3rem">🔖</p><p>No bookmarks yet. Save books to find them here.</p></div>`;
        } else {
            body.innerHTML = `<div style="padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">
                ${saved.map(book => {
                    const colors = COVER_COLORS[book.coverColor % COVER_COLORS.length];
                    return `<div class="book-card" onclick="closeModal();setTimeout(()=>openBook(${JSON.stringify(book).replace(/"/g,'&quot;')}),100)" style="cursor:pointer">
                        <div class="book-cover" style="background:linear-gradient(135deg,${colors[0]},${colors[1]})">
                            <span class="cover-text">${book.title}</span>
                        </div>
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                            <div class="book-author">${book.author}</div>
                        </div>
                    </div>`;
                }).join('')}
            </div>`;
        }
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    // ──────────────────────────────────────────────
    //  AUTHOR PANEL
    // ──────────────────────────────────────────────
    function toggleAuthorPanel() {
        const panel = document.getElementById('authorPanel');
        const isVisible = panel.classList.contains('visible');
        if (!isVisible) {
            panel.classList.add('visible');
            renderAuthorPanel();
        } else {
            panel.classList.remove('visible');
        }
        document.getElementById('authorToggleBtn').classList.toggle('active-author', !isVisible);
    }

    function renderAuthorPanel() {
        const content = document.getElementById('authorPanelContent');

        if (!authorLoggedIn) {
            content.innerHTML = `
                <div class="login-modal" style="max-width:360px">
                    <p class="subtitle">Enter the author passcode to manage books.</p>
                    <input type="password" id="passcodeInput" placeholder="Passcode" onkeydown="if(event.key==='Enter')authorLogin()">
                    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="authorLogin()">Login</button>
                </div>`;
            return;
        }

        content.innerHTML = `
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
                <button class="btn btn-primary btn-sm" onclick="showUploadForm()">+ Add Book</button>
                <button class="btn btn-outline btn-sm" onclick="authorLogout()">Logout</button>
            </div>
            <div id="uploadForm" style="display:none">
                <div class="form-grid" style="margin-bottom:16px">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="fTitle" placeholder="Book title">
                    </div>
                    <div class="form-group">
                        <label>Author *</label>
                        <input type="text" id="fAuthor" placeholder="Author name">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="fCategory" placeholder="e.g. Fiction, Science">
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="fYear" placeholder="2024">
                    </div>
                    <div class="form-group full-width">
                        <label>Description</label>
                        <textarea id="fDesc" placeholder="Brief description"></textarea>
                    </div>
                    <div class="form-group full-width">
                        <label>Read URL (optional)</label>
                        <input type="url" id="fUrl" placeholder="https://...">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="addBook()">Publish Book</button>
            </div>
            <div class="manage-books-list">
                ${books.map(b => `
                    <div class="manage-book-item">
                        <div class="item-info">
                            <div class="item-title">${b.title}</div>
                            <div class="item-meta">${b.author} · ${b.category} · ${b.year}</div>
                        </div>
                        <button class="btn btn-danger btn-sm" onclick="deleteBook(${b.id})">Delete</button>
                    </div>`).join('')}
            </div>`;
    }

    function showUploadForm() {
        const f = document.getElementById('uploadForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function authorLogin() {
        const code = document.getElementById('passcodeInput').value;
        if (code === 'author123') {
            authorLoggedIn = true;
            localStorage.setItem('ol_author', 'true');
            renderAuthorPanel();
            showToast('Welcome, Author!');
        } else {
            showToast('Incorrect passcode', 'error');
        }
    }

    function authorLogout() {
        authorLoggedIn = false;
        localStorage.removeItem('ol_author');
        renderAuthorPanel();
        showToast('Logged out', 'info');
    }

    function addBook() {
        const title  = document.getElementById('fTitle').value.trim();
        const author = document.getElementById('fAuthor').value.trim();
        if (!title || !author) { showToast('Title and Author are required', 'error'); return; }

        const book = {
            id: Date.now(),
            title,
            author,
            category: document.getElementById('fCategory').value.trim() || 'General',
            year: parseInt(document.getElementById('fYear').value) || new Date().getFullYear(),
            description: document.getElementById('fDesc').value.trim(),
            url: document.getElementById('fUrl').value.trim(),
            coverColor: Math.floor(Math.random() * COVER_COLORS.length),
        };

        books.unshift(book);
        saveBooks();
        renderAll();
        renderAuthorPanel();
        showToast(`"${title}" published!`);
    }

    function deleteBook(id) {
        if (!confirm('Delete this book?')) return;
        books = books.filter(b => b.id !== id);
        bookmarks = bookmarks.filter(bid => bid !== id);
        saveBooks();
        saveBookmarks();
        renderAll();
        renderAuthorPanel();
        closeModal();
        showToast('Book deleted', 'info');
    }

    // ──────────────────────────────────────────────
    //  INIT
    // ──────────────────────────────────────────────
    renderAll();
    </script>
</body>
</html>
